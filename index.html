}

/* ─── DASHBOARD PAGE ─── */
function AITab({item,isLead,update}){
  const itemName=isLead?item.firstName+" "+item.lastName:item.clientFullName||item.clientName;
  const stage=isLead?item.leadStage:item.matterStage;
  const bkType=item.bankruptcyType||"Chapter 7";

  // Means Test data from item or defaults
  const mt=item.meansTest||{};
  const cmi=mt.cmi||item.monthlyIncome||0;
  const householdSize=mt.householdSize||1;
  // Median income thresholds by household size (2025 Census / DOJ)
  const medianThresholds={1:63957,2:83476,3:97234,4:114663,5:124663,6:134663};
  const medianThreshold=mt.medianThreshold||(medianThresholds[householdSize]||medianThresholds[1]);
  const annualizedIncome=cmi*12;
  const belowMedian=annualizedIncome<=medianThreshold;
  const deductions=mt.deductions||0;
  const adjustedCAI=belowMedian?0:Math.max(0,cmi-deductions);
  const passes=belowMedian||adjustedCAI<=0;

  // Confidence Score: 20 base + up to 60 for pay stubs (10 per month) + 20 for tax doc match
  const payStubMonths=Math.min(6,parseInt(mt.payStubMonths)||0);
  const taxMatch=mt.taxMatch||false;
  const confidenceScore=Math.min(100,20+(payStubMonths*10)+(taxMatch?20:0));
  const confidenceColor=confidenceScore>=80?"#3d5c43":confidenceScore>=50?"#FF9800":"#c0392b";
  const confidenceLevel=confidenceScore>=80?"High":confidenceScore>=50?"Medium":"Low";
  const confidenceExplanation=confidenceScore>=80?"Strong documentation supports this analysis. Pay stubs and tax records are well-matched.":confidenceScore>=50?"Moderate documentation received. Additional pay stubs or tax verification would strengthen confidence.":"Limited documentation available. Analysis reliability is low until more records are provided.";

  const saveMeansTest=(field,val)=>{
    const updated={...mt,[field]:parseFloat(val)||0};
    if(update)update({meansTest:updated});
  };

  // Recommendations based on stage
  const getRecs=()=>{
    const r=[];
    if(isLead){
      if(stage==="New Lead"){r.push("Schedule initial consultation","Send intake form to client","Run preliminary means test","Verify income documents");}
      else if(stage==="Consult Scheduled"){r.push("Prepare consultation questions","Review client credit report","Estimate case complexity");}
      else if(stage==="Pending Engagement"){r.push("Send engagement letter","Collect required documents","Schedule signing appointment");}
      else{r.push("Order credit report","Send intake form","Schedule credit counseling");}
    }else{
      if(stage.includes("Pending Documents")){r.push("Send document collection list","Request missing exhibits","Schedule document review");}
      else if(stage.includes("Review")){r.push("Complete petition review","Prepare client for filing","Order credit report");}
      else if(stage.includes("341")){r.push("Review petition with client","Prepare client for trustee questions","Confirm Zoom credentials");}
      else if(stage.includes("Filed")){r.push("Monitor case docket","Prepare for 341 hearing","Send document request to client");}
      else if(stage.includes("Discharge")){r.push("Confirm discharge entered","Send discharge letter to client","Close matter");}
      else{r.push("Review case status","Check for outstanding tasks","Follow up with client");}
    }
    return r;
  };

  // Document checklist
  const getDocChecklist=()=>{
    const docs=item.documents||[];
    const docNames=docs.map(d=>(d.name||"").toLowerCase());
    const required=[
      {name:"Pay Stubs (6 months)",key:"pay stub"},
      {name:"Bank Statements (6 months)",key:"bank statement"},
      {name:"Tax Returns (2 years)",key:"tax return"},
      {name:"Credit Report",key:"credit report"},
      {name:"Driver's License / ID",key:"license"},
      {name:"Social Security Card",key:"social security"},
      {name:"Vehicle Registration",key:"vehicle"},
      {name:"Mortgage Statement",key:"mortgage"},
      {name:"Credit Counseling Certificate",key:"credit counseling"},
    ];
    return required.map(r=>({...r,received:docNames.some(d=>d.includes(r.key))}));
  };

  // Risk flags
  const getFlags=()=>{
    const f=[];
    if(item.documents&&item.documents.length===0)f.push({text:"No documents uploaded yet",level:"warning"});
    if(!isLead&&!item.customFields?.caseNumber)f.push({text:"Case number not assigned",level:"warning"});
    if(isLead&&!item.leadNotes)f.push({text:"Lead notes not documented",level:"info"});
    if(cmi>0&&!belowMedian&&bkType==="Chapter 7")f.push({text:"Income above median — Chapter 7 eligibility at risk",level:"critical"});
    if(!isLead&&item.outstandingBalance>0)f.push({text:"Outstanding balance of "+fmtDec(item.outstandingBalance),level:"warning"});
    return f;
  };

  const recs=getRecs();
  const docChecklist=getDocChecklist();
  const flags=getFlags();
  const receivedCount=docChecklist.filter(d=>d.received).length;

  // Complexity Score Calculation
  const getComplexityScore=()=>{
    let score=0;
    let factors=[];
    // Debt level
    const debt=item.totalDebt||0;
    if(debt>100000){score+=25;factors.push({label:"High Debt (>$100k)",points:25});}
    else if(debt>50000){score+=15;factors.push({label:"Moderate Debt ($50k-$100k)",points:15});}
    else if(debt>20000){score+=8;factors.push({label:"Standard Debt ($20k-$50k)",points:8});}
    else if(debt>0){score+=3;factors.push({label:"Low Debt (<$20k)",points:3});}
    // Income above median
    if(!belowMedian&&cmi>0){score+=20;factors.push({label:"Income Above Median",points:20});}
    // Asset complexity
    const assets=item.totalAssets||0;
    if(assets>50000){score+=15;factors.push({label:"Significant Assets (>$50k)",points:15});}
    else if(assets>20000){score+=8;factors.push({label:"Moderate Assets ($20k-$50k)",points:8});}
    // Joint case
    const contacts=item.contacts||[];
    if(contacts.length>1){score+=10;factors.push({label:"Joint Filing",points:10});}
    // Missing documents
    const missingDocs=docChecklist.filter(d=>!d.received).length;
    if(missingDocs>=6){score+=15;factors.push({label:"Many Documents Missing ("+missingDocs+")",points:15});}
    else if(missingDocs>=3){score+=8;factors.push({label:"Some Documents Missing ("+missingDocs+")",points:8});}
    // Chapter 13 adds complexity
    if(bkType==="Chapter 13"){score+=15;factors.push({label:"Chapter 13 (Plan Required)",points:15});}
    // Risk flags
    if(flags.filter(f=>f.level==="critical").length>0){score+=10;factors.push({label:"Critical Risk Flags",points:10});}
    return{score:Math.min(score,100),factors};
  };
  const complexity=getComplexityScore();
  const complexityLevel=complexity.score>=70?"High":complexity.score>=40?"Medium":"Low";
  const complexityColor=complexity.score>=70?"#c0392b":complexity.score>=40?"#FF9800":"#3d5c43";

  // AI Attorney Summary
  const getAttorneySummary=()=>{
    const parts=[];
    parts.push(itemName+" — "+bkType+" "+(isLead?"lead":"matter")+", currently at \""+stage+"\" stage.");
    if(cmi>0){
      parts.push("CMI: "+fmtDec(cmi)+"/mo"+(belowMedian?" (below median, HH size "+householdSize+").":" (ABOVE median, HH size "+householdSize+" — Ch. 7 eligibility concern)."));
    }
    if(!isLead&&item.totalDebt>0){
      parts.push("Scheduled debt: "+fmtDec(item.totalDebt)+". Assets: "+fmtDec(item.totalAssets||0)+". Exemptions: "+fmtDec(item.exemptions||0)+".");
    }
    if(!belowMedian&&bkType==="Chapter 7")parts.push("ALERT: Means test may not pass — consider Chapter 13 conversion or further deduction analysis.");
    if(receivedCount<docChecklist.length){
      parts.push("Document status: "+receivedCount+"/"+docChecklist.length+" received ("+Math.round((receivedCount/docChecklist.length)*100)+"% complete). Missing items may delay filing.");
    }else{
      parts.push("All required documents received — ready for petition preparation.");
    }
    if(flags.filter(f=>f.level==="critical").length>0)parts.push("CRITICAL FLAGS present — review before proceeding.");
    parts.push("Complexity: "+complexityLevel+" ("+complexity.score+"/100).");
    if(!isLead&&item.customFields?.dateTime341)parts.push("341 Meeting: "+item.customFields.dateTime341+".");
    return parts.join(" ");
  };

  // AI Debtor Summary
  const getDebtorSummary=()=>{
    const parts=[];
    parts.push("Dear "+itemName.split(" ")[0]+", here is a summary of your "+bkType+" bankruptcy case.");
    parts.push("Your case is currently in the \""+stage+"\" phase.");
    if(cmi>0){
      if(belowMedian)parts.push("Based on your household income of "+fmtDec(cmi)+" per month, you qualify under the income limits for your household size.");
      else parts.push("Your household income of "+fmtDec(cmi)+" per month is above the threshold for your household size. Your attorney will work with you on next steps.");
    }
    if(!isLead&&item.totalDebt>0){
      parts.push("Your total reported debts are "+fmtDec(item.totalDebt)+".");
    }
    if(receivedCount<docChecklist.length){
      const missing=docChecklist.filter(d=>!d.received).map(d=>d.name);
      parts.push("We still need the following documents from you: "+missing.join(", ")+".");
    }else{
      parts.push("We have received all the documents we need from you. Thank you!");
    }
    if(!isLead&&item.customFields?.dateTime341)parts.push("Your 341 Meeting of Creditors is scheduled for "+item.customFields.dateTime341+". Your attorney will prepare you beforehand.");
    parts.push("If you have any questions, please don't hesitate to contact our office.");
    return parts.join(" ");
  };

  // PDF download handler
  const downloadSummaryPDF=(title,content)=>{
    const printWin=window.open("","_blank","width=800,height=600");
    printWin.document.write("<html><head><title>"+title+"</title><style>body{font-family:'Inter',sans-serif;padding:40px;line-height:1.8;color:#333;max-width:700px;margin:0 auto;}h1{font-size:18px;color:#3d5c43;border-bottom:2px solid #7a9c80;padding-bottom:10px;margin-bottom:20px;}.meta{font-size:12px;color:#888;margin-bottom:20px;}.content{font-size:14px;}</style></head><body>");
    printWin.document.write("<h1>"+title+"</h1>");
    printWin.document.write("<div class='meta'>Generated: "+new Date().toLocaleDateString()+" | Client: "+itemName+" | "+bkType+"</div>");
    printWin.document.write("<div class='content'>"+content+"</div>");
    printWin.document.write("<div style='margin-top:30px;padding:12px 16px;background:#f8f9fa;border-left:3px solid #d0d0d0;border-radius:4px;'><p style='font-size:11px;line-height:1.6;color:#888;margin:0;font-style:italic;'>This summary was generated by AI and is based solely on the information submitted through your intake worksheet and uploaded documents. It does not constitute legal advice. The information has not been independently verified and may contain errors or omissions. Please review all details with your attorney before relying on this summary or taking any action.</p></div>");
    printWin.document.write("</body></html>");
    printWin.document.close();
    setTimeout(()=>{printWin.print();},300);
  };

  return(
    <div>
      <div style={{fontSize:12,color:"#999",fontStyle:"italic",marginBottom:14,textAlign:"center"}}>*AI makes mistakes! A human should always confirm information</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:20}}>

        {/* AI Means Test Analysis */}
        <Widget title="AI Means Test Analysis" collapsible={false}>
          {/* Result indicator */}
          <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",borderRadius:10,background:belowMedian?"#f0f7f1":"#fef2f2",marginBottom:16}}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              {belowMedian?<><path d="M22 11.08V12a10 10 0 11-5.93-9.14" stroke="#3d5c43" strokeWidth="2" strokeLinecap="round"/><path d="M22 4L12 14.01l-3-3" stroke="#3d5c43" strokeWidth="2" strokeLinecap="round"/></>:<><circle cx="12" cy="12" r="10" stroke="#c0392b" strokeWidth="2"/><path d="M15 9l-6 6M9 9l6 6" stroke="#c0392b" strokeWidth="2" strokeLinecap="round"/></>}
            </svg>
            <span style={{fontSize:14,fontWeight:600,color:belowMedian?"#3d5c43":"#c0392b"}}>{belowMedian?"Income is below the median":"Income is above the median"}</span>
          </div>

          {/* Median Family Income */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 0",borderBottom:"1px solid #f0f0f0"}}>
            <div>
              <div style={{fontSize:14,fontWeight:500,color:"#434343"}}>Median Family Income</div>
              <div style={{fontSize:11,color:"#999",marginTop:2}}>{mt.state||"California"} • Household of {householdSize} (UST)</div>
            </div>
            <div style={{fontSize:16,fontWeight:700,color:"#1a73e8"}}>{fmtDec(medianThreshold)}</div>
          </div>

          {/* Annualized CMI */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 0",borderBottom:"1px solid #f0f0f0"}}>
            <div style={{fontSize:14,fontWeight:500,color:"#434343"}}>Current Monthly Income (CMI)</div>
            <div style={{fontSize:16,fontWeight:700,color:belowMedian?"#3d5c43":"#c0392b"}}>{fmtDec(cmi)}</div>
          </div>
          {/* Confidence Score */}
          <div style={{padding:"14px 0"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div style={{fontSize:14,fontWeight:500,color:"#434343"}}>Confidence Score</div>
              <span style={{padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:600,background:confidenceScore>=80?"#dce8de":confidenceScore>=50?"#FFF3E0":"#fde8e8",color:confidenceColor}}>{confidenceLevel}</span>
            </div>
            <div style={{marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <span style={{fontSize:28,fontWeight:700,color:confidenceColor}}>{confidenceScore}</span>
                <span style={{fontSize:12,color:"#888"}}>/100</span>
              </div>
              <div style={{width:"100%",height:8,background:"#f0f0f0",borderRadius:4,overflow:"hidden"}}>
                <div style={{width:confidenceScore+"%",height:"100%",background:confidenceColor,borderRadius:4,transition:"width 0.3s ease"}}/>
              </div>
            </div>
            <div style={{fontSize:12,color:"#777",lineHeight:"1.5"}}>{confidenceExplanation}</div>
          </div>
          <div style={{marginTop:8,padding:"10px 14px",background:"#f8f9fa",borderRadius:6,borderLeft:"3px solid #d0d0d0"}}>
            <p style={{fontSize:11,lineHeight:1.5,color:"#888",margin:0,fontStyle:"italic"}}>Confidence is based on documentation completeness: 20-point base, up to 60 points for pay stubs received (10 per month of the 6-month lookback), and 20 points if reported income is verified against tax documents within a 90% match.</p>
          </div>
        </Widget>

        {/* Complexity Score & Risk Flags */}
        <Widget title="Complexity Score" collapsible={false} actions={<span style={{padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:600,background:complexity.score>=70?"#fde8e8":complexity.score>=40?"#FFF3E0":"#dce8de",color:complexityColor}}>{complexityLevel}</span>}>
          <div style={{marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <span style={{fontSize:28,fontWeight:700,color:complexityColor}}>{complexity.score}</span>
              <span style={{fontSize:12,color:"#888"}}>/100</span>
            </div>
            <div style={{width:"100%",height:8,background:"#f0f0f0",borderRadius:4,overflow:"hidden"}}>
              <div style={{width:complexity.score+"%",height:"100%",background:complexityColor,borderRadius:4,transition:"width 0.3s ease"}}/>
            </div>
          </div>
          {complexity.factors.length>0&&(
            <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:flags.length>0?16:0}}>
              <div style={{fontSize:12,fontWeight:600,color:"#888",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:2}}>Contributing Factors</div>
              {complexity.factors.map((f,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:i<complexity.factors.length-1?"1px solid #f5f5f5":"none"}}>
                  <span style={{fontSize:13,color:"#555"}}>{f.label}</span>
                  <span style={{fontSize:12,fontWeight:600,color:complexityColor}}>+{f.points}</span>
                </div>
              ))}
            </div>
          )}
          {flags.length>0&&(
            <div>
              <div style={{fontSize:12,fontWeight:600,color:"#888",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:8,paddingTop:flags.length>0&&complexity.factors.length>0?12:0,borderTop:complexity.factors.length>0?"1px solid #e0e0e0":"none"}}>Risk Flags ({flags.length})</div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {flags.map((f,i)=>{
                  const colors={critical:{bg:"#fde8e8",border:"#f5c6c6",icon:"#c0392b",text:"#c0392b"},warning:{bg:"#FFF3E0",border:"#FFE0B2",icon:"#FF9800",text:"#E65100"},info:{bg:"#e8f4fd",border:"#bbdefb",icon:"#1a73e8",text:"#1565c0"}};
                  const c=colors[f.level]||colors.info;
                  return(
                    <div key={i} style={{display:"flex",gap:10,padding:8,background:c.bg,borderRadius:6,border:"1px solid "+c.border,alignItems:"center"}}>
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style={{flexShrink:0}}><path d="M12 9v4M12 17h.01" stroke={c.icon} strokeWidth="2.5" strokeLinecap="round"/><circle cx="12" cy="12" r="10" stroke={c.icon} strokeWidth="1.5" fill="none"/></svg>
                      <div style={{fontSize:12,color:c.text,fontWeight:500}}>{f.text}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
          <div style={{marginTop:16,padding:"10px 14px",background:"#f8f9fa",borderRadius:6,borderLeft:"3px solid #d0d0d0"}}>
            <p style={{fontSize:11,lineHeight:1.5,color:"#888",margin:0,fontStyle:"italic"}}>Score is calculated from intake data: total debt level, income relative to the state median, total assets, joint filing status, missing documents, case chapter, and critical risk flags. Each factor adds weighted points up to a maximum of 100.</p>
          </div>
        </Widget>

          {[
            {name:"Intake Form Link",when:"Sent when the intake link is emailed to a new lead — moves the lead to Intake Sent",task:"Sent directly by staff (no approval task)",subject:"Your secure intake form — {FirmName}",body:"Hi {FirstName},\n\nThank you for reaching out to {FirmName}. To get started, please complete our secure intake form at the link below. It walks you through everything we need and lets you upload documents as you go.\n\n{IntakeLink}\n\nIf you have any questions along the way, just reply to this email or call our office.\n\n{AttorneyName}"},
            {name:"Intake Follow-Up",when:"Drafted 1 week after the intake link is sent; weekly until the debtor submits",task:"Approve follow-up email — intake not completed",subject:"Quick reminder — your intake form is waiting",body:"Hi {FirstName},\n\nJust a friendly reminder that your intake form is still waiting for you. Completing it is the first step toward getting your case moving, and it usually takes about 20 minutes.\n\n{IntakeLink}\n\nIf you've run into any trouble with the form or have questions, reply here and we'll help.\n\n{AttorneyName}"},
            {name:"AI Intake Report",when:"Drafted immediately after the intake packet is submitted",task:"Review & approve AI intake report email",subject:"Your intake review — {FirmName}",body:"Hi {FirstName},\n\nThank you for completing your intake. We've reviewed everything you submitted, and your personalized intake report is below.\n\n{AIReport}\n\nWe'll be in touch about next steps. If anything in the report looks off, or you have questions, reply here or call our office.\n\n{AttorneyName}"},
            {name:"Document Request Follow-Up",when:"Drafted 1 week after submission; weekly until the flagged documents are received",task:"Approve document follow-up request",subject:"A few documents we still need",body:"Hi {FirstName},\n\nThanks again for submitting your intake. To keep your case moving, we still need the following:\n\n{MissingDocuments}\n\nYou can upload these through your secure portal at the link below.\n\n{UploadLink}\n\nIf you're not sure where to find any of these, reply here and we'll point you in the right direction.\n\n{AttorneyName}"},

                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style={{flexShrink:0}}><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke="#7a9c80" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>

          {[
            {title:"All Cases (every filing)",ids:DOC_TYPES.filter(d=>d.group==="all").map(d=>d.id)},

          <div style={{background:"#fff",borderRadius:10,border:"1px solid #e0e0e0",overflow:"hidden"}}>

              <div style={{fontWeight:700,color:"#434343",marginBottom:6}}>How a document moves</div>
              <div style={{marginBottom:14}}>
                {[
                  ["Intake Submitted","the debtor's checklist is built from their intake answers. Documents uploaded with the intake go straight to AI analysis, and the AI recommends each one for final acceptance or rejection by the law firm. Anything not uploaded starts as Awaiting Upload."],
                  ["AI Analysis","every upload is analyzed automatically and either accepted or flagged."],
                  ["Firm Approval","a member of your firm approves or rejects it. AI acceptance is a recommendation — no document is final until your firm approves it. Rejected documents return to Awaiting Upload and join the next follow-up email."],
                ].map((st,i)=>(
                  <div key={i} style={{display:"flex",gap:10,marginBottom:6}}>
                    <div style={{width:20,height:20,borderRadius:"50%",background:"#e7eae5",color:"#3d5c43",fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:2}}>{i+1}</div>

              <div style={{fontWeight:700,color:"#434343",marginBottom:6}}>Document categories</div>
              <div style={{marginBottom:14}}>
                {[
                  ["#7a9c80","Approved by Firm","home base. Uploaded, accepted by the AI analysis, and manually approved by your firm. A case is document-complete when everything applicable is here."],
                  ["#F59E0B","Accepted by AI","uploaded and passed the AI analysis. Waiting on your firm's approval."],
                  ["#dc3545","AI Flagged","uploaded, but the AI found a problem (wrong document, missing pages, illegible). Your firm reviews it — approve anyway, or reject to re-request."],
                  ["#dc3545","Rejected","reviewed and rejected by your firm, with the reason attached. Re-requested from the debtor in the next follow-up email and moved to Awaiting Upload."],
                  ["#999999","Not Applicable","the debtor gave a reason instead of uploading. Judgment-call reasons are flagged for attorney review."],
                  ["#F59E0B","Awaiting Upload","not yet received — never uploaded or promised for later. Awaiting Upload and Rejected together make up the follow-up email request list."],
                ].map((c,i)=>(
                  <div key={i} style={{display:"flex",gap:10,marginBottom:6}}>
                    <div style={{width:10,height:10,borderRadius:"50%",background:c[0],flexShrink:0,marginTop:6}}/>
                    <div><strong style={{color:"#434343"}}>{c[1]}</strong> — {c[2]}</div>
                  </div>
                ))}
              </div>
              <div style={{fontWeight:700,color:"#434343",marginBottom:6}}>How and when we follow up</div>
              <p style={{margin:"0 0 14px"}}>Once a week, the AI drafts a single follow-up email listing everything still awaiting upload — including anything your firm rejected, with the rejection reason written in. It is never sent automatically: it arrives as the task “Approve document follow-up request” and goes out only after someone at your firm approves it. Follow-ups repeat weekly until every item is received or accounted for.</p>
              <div style={{fontWeight:700,color:"#434343",marginBottom:6}}>What the debtor's reasons do</div>
              <p style={{margin:"0 0 6px"}}><strong>Keep chasing:</strong> “{DOC_REASONS.will_send_later}” and “{DOC_REASONS.not_taken_yet}” — the item stays on the follow-up list.</p>
              <p style={{margin:"0 0 14px"}}><strong>Stop chasing, flag for attorney review:</strong> “{DOC_REASONS.doesnt_apply}”, “{DOC_REASONS.didnt_file}”, and “{DOC_REASONS.dont_have_copy}” (softer chase).</p>
              <p style={{margin:0}}><strong>One per asset:</strong> valuation reports, mortgage statements, and vehicle titles generate one checklist item per property or vehicle.</p>
            </div>
          </div>
        </div>
      )}

      {settingsTab==="users"&&(
        <div>
          <div style={{background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",overflow:"hidden"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"20px 24px",borderBottom:"1px solid #e0e0e0"}}>
              <div>
                <h2 style={{fontSize:16,fontWeight:700,color:"#434343",margin:0}}>User Management</h2>
                <p style={{fontSize:13,color:"#888",margin:"4px 0 0"}}>Manage staff access, permissions and account statuses.</p>
              </div>
            </div>
            <div style={{background:"#fff",borderRadius:8,margin:20,border:"1px solid #e0e0e0",overflow:"hidden"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 20px",borderBottom:"1px solid #e0e0e0"}}>
                <h3 style={{fontSize:15,fontWeight:600,color:"#434343",margin:0}}>Users List</h3>
                <button onClick={()=>{setEditingUser(null);setUserForm({firstName:"",lastName:"",email:"",role:"Staff"});setShowAddUser(true);}} style={{padding:"8px 18px",fontSize:13,fontWeight:600,border:"none",borderRadius:6,background:"#7a9c80",color:"#fff",cursor:"pointer"}}>Add New User</button>

              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>

                  {["S.No","Name","Email ID","Role","Status","Action"].map(h=><th key={h} style={{textAlign:"left",padding:"10px 14px",color:"#666",fontWeight:600,fontSize:12,textTransform:"uppercase",letterSpacing:0.5}}>{h}</th>)}
                </tr></thead>
                <tbody>{users.map((u,i)=>(

                          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z" stroke="#666" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>

/* ─── DASHBOARD (LITE) ─── */
function DashboardPage({leads,setLeads,setPage,setSelectedLead}){
  const today=new Date();
  const dateStr=today.toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
  const affirmations=[
    "Every client you help today gets a real shot at a fresh start.",
    "Your work gives families the breathing room they desperately need.",
    "Behind every case number is a family counting on you — and you show up.",
    "Every petition you file is a door opening for someone who felt trapped.",
    "You don't just practice law — you practice kindness under pressure.",
  ];
  const [affirmation]=useState(()=>affirmations[Math.floor(Math.random()*affirmations.length)]);

  const todayISO=new Date().toISOString().split("T")[0];
  const allTasks=useMemo(()=>{
    const t=[];
    (leads||[]).forEach(l=>{(l.tasks||[]).filter(tk=>tk.status!=="Completed").forEach(tk=>t.push({...tk,leadName:l.firstName+" "+l.lastName,leadId:l.id,leadStage:l.leadStage}));});
    return _.orderBy(t,"due","asc");
  },[leads]);
  const [dashTaskFilter,setDashTaskFilter]=useState("All");
  const tasks=dashTaskFilter==="All"?allTasks:allTasks.filter(t=>t.assignee===dashTaskFilter);
  const completeTask=(t)=>setLeads(prev=>prev.map(l=>{
    if(l.id!==t.leadId)return l;
    let tasks=(l.tasks||[]).map(tk=>tk.id===t.id?{...tk,status:"Completed",completedDate:todayISO}:tk);
    if(t.recurring&&l.leadStage===t.stage){
      const next=new Date(Date.now()+7*86400000).toISOString().split("T")[0];
      tasks=[{...t,id:Date.now(),status:"Pending",due:next,completedDate:undefined},...tasks];
    }
    return {...l,tasks};
  }));


  const quickLinks=[
    {label:"Intake Form Link — New Lead",icon:"M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1",url:"https://dev-mccunelegal.bkfastlane.com/filer/signin"},
  ];

  const cardStyle={background:"#fff",borderRadius:10,border:"1px solid #e0e0e0",overflow:"hidden"};
  const headerStyle={padding:"14px 20px",borderBottom:"1px solid #eee",fontSize:14,fontWeight:600,color:"#434343",display:"flex",alignItems:"center",gap:8};

  return(
    <div style={{padding:"24px 28px",flex:1}}>
      <div style={{marginBottom:18}}>
        <h1 style={{fontSize:32,fontWeight:700,color:"#434343",marginBottom:6,lineHeight:1.2}}>{dateStr}</h1>
        <p style={{fontSize:18,color:"#434343",fontWeight:700,fontStyle:"italic",margin:0,lineHeight:1.5}}>{affirmation}</p>
      </div>

      {/* First-run welcome — only when the firm has no leads yet */}
      {leads.length===0&&(
        <div style={{background:"#fff",border:"1px solid #e0e0e0",borderRadius:10,padding:"28px 32px",marginBottom:18,display:"flex",alignItems:"center",gap:18}}>
          <div style={{width:48,height:48,borderRadius:10,background:"#e7eae5",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke="#7a9c80" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </div>
          <div>
            <div style={{fontSize:16,fontWeight:700,color:"#434343",marginBottom:4}}>Welcome to your intake dashboard</div>
            <div style={{fontSize:13,color:"#666",lineHeight:1.6}}>Create your first lead and send them an intake link to get started. As debtors work through their intake, their progress shows up here — and anything that needs your approval lands in the task list below.</div>
          </div>
        </div>
      )}

      {/* Intake pipeline (moved from Leads page) */}
      <div style={{display:"flex",gap:12,marginBottom:18}}>
        {LEAD_STAGES.map(stage=>{
          const sc=leadStageColors[stage]||{bg:"#f5f5f5",border:"#999",text:"#555"};
          const stageLeads=leads.filter(l=>l.leadStage===stage);
          return(
            <div key={stage} style={{flex:1,background:"#fff",borderRadius:10,border:"1px solid #e0e0e0",overflow:"hidden"}}>
              <div onClick={()=>setPage("leads")} style={{background:sc.bg,padding:"12px 16px",borderBottom:"2px solid "+sc.border,display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
                <span style={{fontSize:12,fontWeight:700,color:sc.text,textTransform:"uppercase",letterSpacing:"0.5px"}}>{stage}</span>
                <span style={{background:sc.border,color:"#fff",borderRadius:12,padding:"2px 8px",fontSize:11,fontWeight:700}}>{stageLeads.length}</span>
              </div>
              <div style={{padding:"10px 12px",minHeight:80,maxHeight:220,overflowY:"auto"}}>
                {stageLeads.map(l=>(
                  <div key={l.id} onClick={()=>{setSelectedLead(l.id);setPage("lead-detail");}} style={{padding:"8px 10px",marginBottom:6,borderRadius:6,border:"1px solid #eee",cursor:"pointer",transition:"all 0.15s"}} onMouseEnter={e=>e.currentTarget.style.background="#f9f9f6"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <div style={{fontSize:13,fontWeight:600,color:"#434343"}}>{l.firstName} {l.lastName}</div>
                  </div>
                ))}
                {stageLeads.length===0&&<div style={{fontSize:12,color:"#ccc",textAlign:"center",padding:"16px 0"}}>No leads</div>}
              </div>
            </div>
          );
        })}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:18,alignItems:"start"}}>
        {/* LEFT: Quick Links */}
        <div style={cardStyle}>
          <div style={headerStyle}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke="#7a9c80" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
            Quick Links
          </div>
          <div style={{padding:"12px 16px",display:"flex",flexDirection:"column",gap:8}}>
            {quickLinks.map((ql,i)=>(
              <button key={i} onClick={()=>{if(ql.url)window.open(ql.url,"_blank");}} style={{display:"flex",alignItems:"center",gap:8,background:"#7a9c80",color:"#fff",border:"none",borderRadius:8,padding:"10px 16px",fontSize:13,fontWeight:500,cursor:"pointer",transition:"all 0.15s",width:"100%"}} onMouseEnter={e=>e.currentTarget.style.background="#5a7c60"} onMouseLeave={e=>e.currentTarget.style.background="#7a9c80"}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d={ql.icon} stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
                {ql.label}
              </button>
            ))}
          </div>
        </div>

        {/* RIGHT: Tasks */}

/* ─── CONTACT DETAIL PAGE ─── */
function ContactDetailPage({contactId,contactSource,sourceId,matters,setMatters,leads,setLeads,standaloneContacts,setStandaloneContacts,setPage,setSelectedMatter,setSelectedLead,setSelectedContact}){

  // Find the contact and its parent — use sourceId to find the correct parent first
  let contact=null,parentType=null,parentId=null,parentName=null,parentMatterNum=null;
  if(contactSource==="Matter"||!contactSource){
    if(sourceId){const m=matters.find(m=>m.id===sourceId);if(m){const c=m.contacts.find(c=>c.id===contactId);if(c){contact=c;parentType="Matter";parentId=m.id;parentName=m.clientFullName||m.clientName;parentMatterNum=m.matterNumber;}}}
    if(!contact){for(const m of matters){const c=m.contacts.find(c=>c.id===contactId);if(c){contact=c;parentType="Matter";parentId=m.id;parentName=m.clientFullName||m.clientName;parentMatterNum=m.matterNumber;break;}}}
  }
  if(!contact&&(contactSource==="Lead"||!contactSource)){
    if(sourceId){const l=leads.find(l=>l.id===sourceId);if(l){const c=l.contacts.find(c=>c.id===contactId);if(c){contact=c;parentType="Lead";parentId=l.id;parentName=l.firstName+" "+l.lastName;}}}
    if(!contact){for(const l of leads){const c=l.contacts.find(c=>c.id===contactId);if(c){contact=c;parentType="Lead";parentId=l.id;parentName=l.firstName+" "+l.lastName;break;}}}
  }
  if(!contact){
    const c=(standaloneContacts||[]).find(c=>c.id===contactId);
    if(c){contact=c;parentType="Contact";parentId=null;parentName=null;}
  }
  if(!contact)return(<div style={{padding:"24px 28px",flex:1}}><div style={{fontSize:16,color:"#999",textAlign:"center",marginTop:60}}>Contact not found.</div><button onClick={()=>setPage("contacts")} style={{display:"block",margin:"20px auto",background:"#7A9C80",color:"#fff",border:"none",borderRadius:6,padding:"8px 20px",fontSize:13,cursor:"pointer"}}>Back to Contacts</button></div>);

  // Find ALL associated leads and matters for this contact (by name+email match)
  const associations=useMemo(()=>{
    const assoc=[];
    const primaryEmail=contact.email||(contact.emails&&contact.emails[0]&&contact.emails[0].value)||"";
    matters.forEach(m=>{m.contacts.forEach(c=>{
      const cEmail=c.email||(c.emails&&c.emails[0]&&c.emails[0].value)||"";
      if(c.name===contact.name&&cEmail===primaryEmail)assoc.push({type:"Matter",id:m.id,name:m.clientFullName||m.clientName,matterNumber:m.matterNumber,stage:m.matterStage});
    });});
    leads.forEach(l=>{l.contacts.forEach(c=>{
      const cEmail=c.email||(c.emails&&c.emails[0]&&c.emails[0].value)||"";
      if(c.name===contact.name&&cEmail===primaryEmail)assoc.push({type:"Lead",id:l.id,name:l.firstName+" "+l.lastName,stage:l.leadStage});
    });});
    return assoc;
  },[matters,leads,contact]);

  // Generic updater that patches the contact object in its parent array
  const patchContact=(patch)=>{
    const apply=c=>c.id===contactId?{...c,...patch}:c;
    if(parentType==="Matter"){
      setMatters(prev=>prev.map(m=>m.id===parentId?{...m,contacts:m.contacts.map(apply)}:m));
    }else if(parentType==="Lead"){
      setLeads(prev=>prev.map(l=>l.id===parentId?{...l,contacts:l.contacts.map(apply)}:l));
    }else{
      setStandaloneContacts(prev=>(prev||[]).map(apply));
    }
  };

  const update=(field,value)=>{
    const patch={[field]:value};
    if(field==="firstName"||field==="lastName"||field==="middleName"){
      const fn=field==="firstName"?value:contact.firstName;
      const mn=field==="middleName"?value:contact.middleName;
      const ln=field==="lastName"?value:contact.lastName;
      patch.name=[fn,mn,ln].filter(Boolean).join(" ");
    }
    patchContact(patch);
  };

  // --- Multi-value helpers for emails & phones ---
  const emails=contact.emails||[{value:contact.email||"",label:"Personal"}];
  const phones=contact.phones||[{value:contact.phone||"",label:"Mobile"}];

  const setEmails=(newEmails)=>{
    patchContact({emails:newEmails,email:(newEmails[0]||{}).value||""});
  };
  const setPhones=(newPhones)=>{
    patchContact({phones:newPhones,phone:(newPhones[0]||{}).value||""});
  };
  const addEmail=()=>setEmails([...emails,{value:"",label:"Work"}]);
  const addPhone=()=>setPhones([...phones,{value:"",label:"Home"}]);
  const removeEmail=(idx)=>{if(emails.length<=1)return;const n=[...emails];n.splice(idx,1);setEmails(n);};
  const removePhone=(idx)=>{if(phones.length<=1)return;const n=[...phones];n.splice(idx,1);setPhones(n);};
  const updateEmail=(idx,field,val)=>{const n=[...emails];n[idx]={...n[idx],[field]:val};setEmails(n);};
  const updatePhone=(idx,field,val)=>{const n=[...phones];n[idx]={...n[idx],[field]:val};setPhones(n);};

  const EMAIL_LABELS=["Personal","Work","Other"];
  const PHONE_LABELS=["Mobile","Home","Work","Fax","Other"];

  // --- Editable single field component ---
  const EditableField=({label,field,value,type})=>{
    const [editing,setEditing]=useState(false);
    const [draft,setDraft]=useState(value||"");
    useEffect(()=>setDraft(value||""),[value]);
    if(editing)return(<div style={{marginBottom:16}}><div style={{fontSize:12,fontWeight:600,color:"#888",marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>{label}</div><div style={{display:"flex",gap:6}}><input autoFocus value={draft} onChange={e=>setDraft(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){update(field,draft);setEditing(false);}if(e.key==="Escape")setEditing(false);}} style={{flex:1,padding:"8px 12px",borderRadius:6,border:"1px solid #7A9C80",fontSize:14,outline:"none"}} type={type||"text"}/><button onClick={()=>{update(field,draft);setEditing(false);}} style={{background:"#7A9C80",color:"#fff",border:"none",borderRadius:6,padding:"6px 14px",fontSize:12,cursor:"pointer"}}>Save</button><button onClick={()=>setEditing(false)} style={{background:"#f0f0f0",color:"#666",border:"none",borderRadius:6,padding:"6px 14px",fontSize:12,cursor:"pointer"}}>Cancel</button></div></div>);
    return(<div style={{marginBottom:16,cursor:"pointer"}} onClick={()=>setEditing(true)}><div style={{fontSize:12,fontWeight:600,color:"#888",marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>{label}</div><div style={{fontSize:14,color:value?"#434343":"#bbb",padding:"8px 0",borderBottom:"1px solid #f0f0f0"}}>{value||"Click to add..."}<svg width="12" height="12" viewBox="0 0 24 24" fill="none" style={{marginLeft:8,opacity:0.3,verticalAlign:"middle"}}><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" stroke="#666" strokeWidth="2" strokeLinecap="round"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" stroke="#666" strokeWidth="2"/></svg></div></div>);
  };

  // --- Multi-value row component ---
  const MultiValueRow=({item,idx,labels,onUpdate,onRemove,canRemove,type})=>{
    const [editing,setEditing]=useState(false);
    const [draft,setDraft]=useState(item.value||"");
    useEffect(()=>setDraft(item.value||""),[item.value]);
    return(
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
        <select value={item.label} onChange={e=>onUpdate(idx,"label",e.target.value)} style={{padding:"7px 8px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:12,background:"#fff",color:"#666",width:90}}>
          {labels.map(l=><option key={l} value={l}>{l}</option>)}
        </select>
        {editing?(
          <div style={{flex:1,display:"flex",gap:6}}>
            <input autoFocus value={draft} onChange={e=>setDraft(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){onUpdate(idx,"value",draft);setEditing(false);}if(e.key==="Escape"){setDraft(item.value||"");setEditing(false);}}} style={{flex:1,padding:"7px 12px",borderRadius:6,border:"1px solid #7A9C80",fontSize:14,outline:"none"}} type={type||"text"}/>
            <button onClick={()=>{onUpdate(idx,"value",draft);setEditing(false);}} style={{background:"#7A9C80",color:"#fff",border:"none",borderRadius:6,padding:"5px 12px",fontSize:12,cursor:"pointer"}}>Save</button>
          </div>
        ):(
          <div onClick={()=>setEditing(true)} style={{flex:1,fontSize:14,color:item.value?"#434343":"#bbb",padding:"7px 0",cursor:"pointer",borderBottom:"1px solid #f0f0f0"}}>{item.value||"Click to add..."}</div>
        )}
        {canRemove&&<button onClick={()=>onRemove(idx)} style={{background:"none",border:"none",cursor:"pointer",padding:4,opacity:0.4,fontSize:16,lineHeight:1,color:"#c44"}} title="Remove">&times;</button>}
      </div>
    );
  };

  const initials=contact.name.split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase();

  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:"100vh"}}>
      {/* Top bar */}
      <div style={{padding:"16px 28px",borderBottom:"1px solid #e0e0e0",background:"#fff",display:"flex",alignItems:"center",gap:12}}>
        <button onClick={()=>setPage("contacts")} style={{background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:6,fontSize:13,color:"#7A9C80",fontWeight:500}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 19l-7-7 7-7" stroke="#7A9C80" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
          All Contacts
        </button>
        <span style={{color:"#ccc"}}>/</span>
        <span style={{fontSize:14,fontWeight:600,color:"#434343"}}>{contact.name}</span>
        {parentType!=="Contact"&&<span style={{marginLeft:"auto",padding:"3px 10px",borderRadius:4,fontSize:11,fontWeight:600,background:parentType==="Matter"?"#dce8de":"#e8f4fd",color:parentType==="Matter"?"#3d5c43":"#1a73e8"}}>{parentType}</span>}
      </div>

      <div style={{padding:"24px 28px",flex:1,overflowY:"auto"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 340px",gap:24}}>
          {/* Left column — Contact info */}
          <div>
            {/* Header card */}
            <div style={{background:"#fff",borderRadius:10,border:"1px solid #e0e0e0",padding:24,marginBottom:20}}>
              <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:20}}>
                <div style={{width:56,height:56,borderRadius:"50%",background:"#E7EAE5",color:"#7A9C80",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:700}}>{initials}</div>
                <div>
                  <h1 style={{fontSize:22,fontWeight:700,color:"#434343",margin:0}}>{contact.name}</h1>
                  <div style={{fontSize:13,color:"#888",marginTop:2}}>Contact</div>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:0}}>
                <EditableField label="First Name" field="firstName" value={contact.firstName}/>
                <EditableField label="Last Name" field="lastName" value={contact.lastName}/>
                <EditableField label="Middle Name" field="middleName" value={contact.middleName}/>
                <EditableField label="Address" field="address" value={contact.address}/>
              </div>
            </div>

            {/* Email Addresses */}
            <div style={{background:"#fff",borderRadius:10,border:"1px solid #e0e0e0",padding:24,marginBottom:20}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <h3 style={{fontSize:14,fontWeight:600,color:"#434343",margin:0}}>Email Addresses</h3>
                <button onClick={addEmail} style={{background:"none",border:"1px solid #7A9C80",color:"#7A9C80",borderRadius:6,padding:"4px 12px",fontSize:12,cursor:"pointer",fontWeight:500}}>+ Add Email</button>
              </div>
              {emails.map((em,i)=><MultiValueRow key={i} item={em} idx={i} labels={EMAIL_LABELS} onUpdate={updateEmail} onRemove={removeEmail} canRemove={emails.length>1} type="email"/>)}
            </div>

            {/* Phone Numbers */}
            <div style={{background:"#fff",borderRadius:10,border:"1px solid #e0e0e0",padding:24,marginBottom:20}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <h3 style={{fontSize:14,fontWeight:600,color:"#434343",margin:0}}>Phone Numbers</h3>
                <button onClick={addPhone} style={{background:"none",border:"1px solid #7A9C80",color:"#7A9C80",borderRadius:6,padding:"4px 12px",fontSize:12,cursor:"pointer",fontWeight:500}}>+ Add Phone</button>
              </div>
              {phones.map((ph,i)=><MultiValueRow key={i} item={ph} idx={i} labels={PHONE_LABELS} onUpdate={updatePhone} onRemove={removePhone} canRemove={phones.length>1} type="tel"/>)}
            </div>

            {/* Notes */}
            <div style={{background:"#fff",borderRadius:10,border:"1px solid #e0e0e0",padding:24}}>
              <h3 style={{fontSize:14,fontWeight:600,color:"#434343",marginTop:0,marginBottom:12}}>Notes</h3>
              <EditableField label="" field="contactNotes" value={contact.contactNotes}/>
            </div>
          </div>

          {/* Right column — Associations */}
          <div>
            <div style={{background:"#fff",borderRadius:10,border:"1px solid #e0e0e0",padding:20}}>
              <h3 style={{fontSize:14,fontWeight:600,color:"#434343",marginTop:0,marginBottom:12}}>Associated With</h3>
              {associations.length===0&&<div style={{fontSize:13,color:"#999"}}>No linked leads or matters.</div>}
              {associations.map((a,i)=>(
                <div key={i} onClick={()=>{if(a.type!=="Matter"){setSelectedLead(a.id);setPage("lead-detail");}}} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:i<associations.length-1?"1px solid #f0f0f0":"none",cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background="#f9f9f6"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <span style={{padding:"2px 8px",borderRadius:4,fontSize:10,fontWeight:600,background:a.type==="Matter"?"#dce8de":"#e8f4fd",color:a.type==="Matter"?"#3d5c43":"#1a73e8"}}>{a.type}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:500,color:"#434343"}}>{a.matterNumber?a.matterNumber+" — ":""}{a.name}</div>
                    <div style={{fontSize:11,color:"#999"}}>{a.stage}</div>
                  </div>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="#999" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

  messages:[
    {id:1,title:"Welcome Email",desc:"Welcome email Chapter 7",subject:"Welcome to McCune Legal",body:"Hi {{contact_first_name}}\n\nThis is McCune Legal.\n\nThanks for choosing our firm. We're glad you're here!\n\nWe'll keep you updated throughout your case using both text messages and email whenever something important happens.\nPlease save this number (877) 386-4950 in your phone as \"McCune Legal Text\" so you don't miss important updates about your case.\n\nIf we need anything from you, you'll receive a message with clear instructions.\n\nYou can also reply to this message if you have questions.\n\nWe're looking forward to helping you move forward!\n\nWELCOME VIDEO FROM MATT MCCUNE\n\n— McCune Legal"},
    {id:1777901125662,title:"Initial document request",desc:"Initial document requests",subject:"Initial document requests",body:"Hello {{contact_first_name}},\n\nWe need the following documents to get your case ready to file. \n\nPLEASE SUBMIT THE DOCUMENTS INTO YOUR SECURE FOLDER HERE: - YOU CAN COPY AND PASTE THIS LINK TO YOUR SECURE FOLDER BUT WE ARE ALSO SENDING YOU A TEXT WITH A DIRECT CLICKABLE LINK TO WHERE YOU CAN UPLOAD YOUR DOCUMENTS\n\nCOMPLETED CLIENT WORKSHEET: CLIENT WORKSHEET PDF (Download a pdf of the client worksheet and upload documents separately) - Upload documents directly into shared folder here: OR COMPLETE GOOGLE FORM AND UPLOAD DOCUMENTS (Complete client worksheet through a Google Form and upload documents directly into Google Form).\nA certificate of counseling for \"pre-bankruptcy counseling.\" The following link will take you to the website where you can complete the REQUIRED pre-bankruptcy counseling class. Make sure you use my attorney code (449858) (so you don't pay): https://www.cricketdebt.com/signup/449858\nALL pay stubs or proof of other income (Social Security/pension/etc) for the past 7 months (if you are self-employed we will need a \"profit and loss statement\" for each month).\nFederal and state tax returns for the past 2 years.\nBank statements for the past six months for all bank accounts you have. \nMost recent statements/bills/notices/etc. for ALL outstanding debts you have (this includes mortgages, HOA, cars, student loans, etc.).\nAny letters you have from attorneys / debt collection companies.\nValuation for any home you own: www.zillow.com\nFor every Car, Motorcycle, ATV, boat, snow mobile, or any major asset, we need a valuation. For cars, you can go to www.kbb.com but for other things you will want to detail how you arrived at the value.\nMost recent statements for any account, such as 401k, IRA, CD's, Pension, Investment account, Education, Health Savings Account, Life Insurance with a Cash Surrender Value, etc.\nCopy of the title for any vehicle you own free of any lien. \nAny Court Paperwork, Divorce Decree(s), Permanent Orders, Writs of Garnishments, Foreclosure, Personal Injury, whether filed against you or by you. (If you are being garnished provide contact info (name/phone/email/fax) for your Human Resources Dept. so we can stop garnishment upon filing.)\nDriver's License AND Social Security Card (or W2)\n\n"},
    {id:1777901247826,title:"All docs and funds received",desc:"All docs and funds received",subject:"All docs and funds received",body:"Next Steps in Your Bankruptcy Case:\n\nHello {{contact_first_name}}, \n\nIt appears that your required payment has been received and that the majority of your required documents are now in—great progress.\n\nThe next step in the process is for our paralegal to begin preparing your case. If any documents are still missing, the paralegal will reach out to you directly. If that happens, we'll need that information as soon as possible to keep things moving forward.\n\nOnce the paralegal has completed their review, your case will be turned over to the attorney for a final review. If the attorney has any questions, they will reach out to you.\n\nAfter that, we will schedule a Zoom video call to review and sign all of your documents so we can get your case filed. This call typically takes about 30–45 minutes. We usually send the paperwork to you in advance so you can review it and confirm that your name, address, and other basic information are correct.\n\nDuring this call, we will also prepare you for your creditor meeting (also held on Zoom), where you will meet with the Trustee. We will make sure you are fully prepared for that hearing.\n\nFollowing the trustee meeting in a Chapter 7 case, there is a 60-day waiting period during which parties may object to the discharge. If there are no objections, the discharge is typically entered about 3 months after the trustee meeting.\n\nPlease let us know if you have any questions as we move forward."},
    {id:1777901452807,title:"Please review your paperwork and schedule a Zoom call to review with your attorney",desc:"Please review your paperwork and schedule a Zoom call to review with your attorney",subject:"Please review your paperwork and schedule a Zoom call to review with your attorney",body:"Hello {{contact_first_name}}\n\nWe look forward to getting your case filed and helping you move forward!\n\nTHIS EMAIL WILL NEED TO BE GENERAL AND NON SPECIFIC - SOMETHING LIKE WE ARE FOLLOWING THIS EMAIL WITH YOUR DOCS ETC - WE CAN ADD THE VIDEO TO THIS MAYBE BUT EACH SPECIFIC COMM WITH THE SPECIFIC DOCS WILL HAVE TO BE A MANUAL SENT EMAIL WITH A TASK LIST - WE SHOULD BE ABLE TO ADD THE LINK TO SCHEDULE THE CALL IN THE AUTO EMAILS \n\nPrior to the meeting, please review the documents, and be ready to inform us of any questions you may have at the meeting. We will of course go over these documents with you as well when we meet and answer all of your questions. Please do not sign these documents as we will execute the documents officially when we meet with you. The only pages that will need to be printed out are the \"Signature Pages\" PDF. You DO NOT need to print out the other PDFs. \nThank you and we look forward to seeing you soon.\n\n\n\n"},
    {id:1777901506336,title:"Your appointment is set - What Happens Next:",desc:"Your appointment is set - What Happens Next:",subject:"Your appointment is set - What Happens Next:",body:"Hi {{contact_first_name}}, \n\nNow that your Zoom signing is scheduled, we're entering the final steps before your Chapter 7 bankruptcy case is filed. During the Zoom meeting, we'll review your bankruptcy paperwork together, answer any last-minute questions, and obtain your signatures on the documents needed to file your case with the court.\n\nZOOM MEETING LINKS HERE\n\nOnce everything is signed and we receive your signatures, we will electronically file your bankruptcy case. Filing immediately triggers the automatic stay, which generally stops collection calls, lawsuits, garnishments, repossessions, and foreclosure actions. Your court-appointed trustee will then schedule your 341 Meeting of Creditors, which is usually held about 30 days after filing. This hearing is typically short and conducted by Zoom or phone in many districts. We will prepare you in advance so you know exactly what to expect.\nAfter the 341 meeting, there is generally a 60-day waiting period during which creditors have the opportunity to object to the discharge, although objections are uncommon in routine cases. Assuming everything proceeds normally, the court will then enter your discharge order, which eliminates eligible debts and gives you your financial fresh start. Most Chapter 7 cases are completed approximately 3–4 months after filing.\nAs always, if you have questions at any point during the process, please don't hesitate to reach out. We'll guide you through each step.\n\nPlease watch the video below where I answer the most common questions. \n\n\n"},
    {id:1777901571220,title:"Your Chapter 7 Case is Filed!",desc:"Your Chapter 7 Case is Filed!",subject:"Your Chapter 7 Case is Filed!",body:"Congrats! Your case is filed!\n \nAwesome! Your Chapter 7 case is filed and the protection of the Bankruptcy Code immediately takes effect. No further harassment by your creditors is permitted. Garnishment, foreclosure, repossession, lawsuits, collection activities, etc all must cease immediately.\n \nPlease read this entire update before reaching out with questions. Your attorney, Matt McCune, created this video to explain in detail, how the next steps in the process of your Chapter 7 Bankruptcy Case will proceed: \n\nWATCH IMPORTANT VIDEO HERE: \n\nYOUR CHAPTER 7 CASE IS FILED \n\nWHAT HAPPENS NOW THAT YOUR CHAPTER 7 CASE IS FILED?\n\nGIVE YOUR CASE INFO TO ANY CREDITOR WHO CONTACTS YOU: {{case_number}}\n \nCHAPTER 7 DISTRICT OF COLORADO\n \nCASE FILING DATE: {{filing_date}}\n \nBANKRUPTCY CASE NUMBER: {{case_number}}\n \nHERE IS WHAT HAPPENS NOW:\n \nA Zoom video appearance with the Court, called a \"Section 341 First Meeting of Creditors\" has been scheduled for: \n\nYOU MUST ATTEND THIS HEARING!\n\nThe hearing will be ON ZOOM!\n \nWE WILL CALL YOU 30 MINUTES BEFORE THE HEARING TO PREPARE YOU AND WE WILL LOG INTO ZOOM TOGETHER. \n \nhttp://www.zoom.us/\n \nMEETING ID: {{341_zoom_meeting_id}}\n \nPASSCODE: {{341_zoom_passcode}}\n\n\nI understand you will be nervous, but I assure you the actual hearing is fairly informal. I will be there to walk you through the whole process (or another attorney from the firm). We will call you before the hearing to prepare you. Please have your computer up and running. The Trustee is NOT a Judge. There is a Federal Bankruptcy Judge assigned to your case, but 99% of Debtors never go in front of the Judge. While the hearing is called a \"Meeting of Creditors,\" creditors rarely actually show up to the hearing. You'll be questioned by the Trustee for about 5 minutes. Myself, or one of my attorneys, will meet with you before and after the hearing to make sure all your questions are answered.\n\nTo help calm any nerves you might be experiencing, I have provided you with the list below, so you can prepare yourself well in advance:\n\nTypical questions asked by the Chapter 7 Bankruptcy Trustee:\nState your name\nDo you promise to tell the truth?\nConfirm your address\nDo you owe a Domestic Support Obligation?\nDid you review and sign the bankruptcy paperwork with your attorney?\nIs that information accurate and correct?\nAre there any changes that need to be made?\nDid you list all your assets?\nDid you list all your debts?\nHow did you value certain assets?\nHow much is your rent/mortgage payment?\nAre you current on your mortgage?\nHow many people in your household?\nAre you owed a tax refund?\nIs a copy of the taxes that you provided to your attorney accurate?\nDid you pay family or friends money prior to filing bankruptcy?\nAny major transfers of property in the past few years?\nDo you have a whole life insurance policy?\nAny major changes since you filed bankruptcy?\nWere you being garnished at the time you filed for bankruptcy?\n \nTake a deep breath!\n\nGetting filed is a HUGE step on the road to moving forward with your life. Make sure you are available for the Zoom hearing (this is the only hearing you are required to attend). As always, please text us if you have any questions or concerns."},
    {id:1777905456599,title:"Document request for 341",desc:"Document request for 341",subject:"Document request for 341",body:"Hi {{contact_first_name}},\n \nAs we prepare for your creditor meeting we need some additional documentation that would not have been available to you when we filed your case. Please email us the following documents ASAP (if applicable):\nBank statement showing the balance in all bank accounts on the day the case was filed: \nWe need a complete bank statement for the month which you filed for bankruptcy - this will not be available until after the end of the month in which you filed. \nAll pay stubs that you have received since the case filing date.\n \nAs always, please let us know if you have any questions"},
    {id:1777905529249,title:"341 Hearing Meeting - one week",desc:"341 Hearing Meeting - one week",subject:"341 Hearing Meeting - one week",body:"Hi!\n \nJust a friendly reminder that your Meeting of Creditors is coming up in a week VIA ZOOM.\n \n \n \nWE WILL CALL YOU 30 MINUTES BEFORE THE HEARING TO PREPARE YOU AND WE WILL LOG INTO ZOOM TOGETHER. \n \nhttp://www.zoom.us/\n \nMEETING ID: \n \nPASSCODE: \n \nBelow is a link to the video we sent you immediately after your case was filed. If you haven't already done so, please watch the video below prior to your hearing as Matt gives a lot of information on what happens at the hearing. Below is also a list of questions that the Trustee typically asks.\n \nWATCH VIDEO: WHAT HAPPENS NOW AFTER YOUR CHAPTER 7 CASE IS FILED\n \nTypical questions asked by the Chapter 7 Bankruptcy Trustee include:\nState your name\nDo you promise to tell the truth?\nConfirm your address\nDo you owe a Domestic Support Obligation?\nDid you review and sign the bankruptcy paperwork with your attorney?\nIs that information accurate and correct?\nAre there any changes that need to be made?\nDid you list all your assets?\nDid you list all your debts?\nHow did you value certain assets?\nHow much is your rent/mortgage payment?\nAre you current on your mortgage?\nHow many people in your household?\nAre you owed a tax refund?\nIs a copy of the taxes that you provided to your attorney accurate?\nDid you pay family or friends money prior to filing bankruptcy?\nAny major transfers of property in the past few years?\nDo you have a whole life insurance policy?\nAny major changes since you filed bankruptcy?\nWere you being garnished at the time you filed for bankruptcy?\n \nI understand you will be nervous, but I assure you the actual hearing is fairly informal. I will be there to walk you through the whole process (or another attorney from the firm). We will call you before the hearing to prepare you. Please have your computer up and running. The Trustee is NOT a Judge. There is a Federal Bankruptcy Judge assigned to your case, but 99% of Debtors never go in front of the Judge. While the hearing is called a \"Meeting of Creditors,\" creditors rarely actually show up to the hearing. You'll be questioned by the Trustee for about 5 minutes. Myself, or one of my attorneys, will meet with you before and after the hearing to make sure all your questions are answered.\n \nAs always, let us know if you have any questions or concerns. \n"},
    {id:1777905603274,title:"341 Creditor Meeting Tomorrow",desc:"341 Creditor Meeting Tomorrow",subject:"341 Creditor Meeting Tomorrow",body:"Hi \n\nJust a friendly reminder that your Meeting of Creditors is coming up TOMORROW VIA ZOOM. \n \n\nWE WILL CALL YOU 30 MINUTES BEFORE THE HEARING TO PREPARE YOU AND WE WILL LOG INTO ZOOM TOGETHER. \n \nwww.zoom.us\n \nMEETING ID: \n \nPASSCODE: \n \n \nBelow is a link to the video we sent you immediately after your case was filed. If you haven't already done so, please watch the video below prior to your hearing as Matt gives a lot of information on what happens at the hearing. Below is also a list of questions that the Trustee typically asks.\n \nWHAT HAPPENS NOW AFTER YOUR CHAPTER 7 CASE IS FILED\n \nTypical questions asked by the Chapter 7 Bankruptcy Trustee include:\nState your name\nDo you promise to tell the truth?\nConfirm your address\nDo you owe a Domestic Support Obligation?\nDid you review and sign the bankruptcy paperwork with your attorney?\nIs that information accurate and correct?\nAre there any changes that need to be made?\nDid you list all your assets?\nDid you list all your debts?\nHow did you value certain assets?\nHow much is your rent/mortgage payment?\nAre you current on your mortgage?\nHow many people in your household?\nAre you owed a tax refund?\nIs a copy of the taxes that you provided to your attorney accurate?\nDid you pay family or friends money prior to filing bankruptcy?\nAny major transfers of property in the past few years?\nDo you have a whole life insurance policy?\nAny major changes since you filed bankruptcy?\nWere you being garnished at the time you filed for bankruptcy?\n \nI understand you will be nervous, but I assure you the actual hearing is fairly informal. I will be there to walk you through the whole process (or another attorney from the firm). We will call you before the hearing to prepare you. Please have your computer up and running. The Trustee is NOT a Judge. There is a Federal Bankruptcy Judge assigned to your case, but 99% of Debtors never go in front of the Judge. While the hearing is called a \"Meeting of Creditors,\" creditors rarely actually show up to the hearing. You'll be questioned by the Trustee for about 5 minutes. Myself, or one of my attorneys, will meet with you before and after the hearing to make sure all your questions are answered.\n \nAs always, let us know if you have any questions or concerns. "},
    {id:1777905687250,title:"Follow-Up: 341 Creditor Meeting completed",desc:"Follow-Up: 341 Creditor Meeting completed",subject:"Follow-Up: 341 Creditor Meeting completed",body:"Hello,\n \nYour Section 341 Creditor Meeting is now over. For most debtors, this is the only hearing you have\nto actually attend!\n \nPlease watch the video below where Matt explains what happens now after the creditor meeting:\n \nMATT MCCUNE: CHAPTER 7 WHAT HAPPENS NOW AFTER YOUR HEARING\n \nYour creditors or the Trustee have 60 days to file an objection to any of your debt being\ndischarged in a Chapter 7 case. This is rare but does happen for certain reasons (alleged fraud) or\nif the US Trustee thinks you should be in a Chapter 13. No news is good news for the next 60\ndays!\n \nDuring this time, you need to complete your required second counseling class. You are not\neligible for your discharge unless you complete the class. You must complete the class within the next 60 days!\n \nThe following link will take you to the website where you can complete the\nREQUIRED post-bankruptcy filing financial management/debtor education class.\nMake sure you use my attorney code (449858) so you don't have to pay for the\nclass: \n \nTAKE DEBTOR EDUCATION COURSE HERE\n \nIf the Trustee requests any documentation we must submit it timely. If there are issues\nrelated to potential non-exempt assets these issues should be resolved in the coming\nmonths.\n \nAssuming everything goes well, your Discharge is approximately only three months away!\nHopefully, your FRESH START is right around the corner. I will continue to work diligently to\nensure the Discharge enters!\n \nAs always, please feel free to reach out to us with any questions!\n\n\n"},
    {id:1777905749534,title:"Discharge Entered",desc:"Discharge Entered",subject:"Discharge Entered",body:"\n\nHello!\n\nYour Discharge is attached! Congrats! It has been a pleasure helping you move forward.\n\nYour case is not over yet and it is important that you follow up with the Trustee on any request they might have to turnover non-exempt assets (usually a portion of your tax refund). We must cooperate with the Trustee or the Trustee has the power down the road to \"revoke\" your Discharge. \n\nAs always, please feel free to let me know if you have any questions. \n\nPS - Be on the lookout for creditors (especially debt collectors) that will try to collect debts from you that were discharged in the bankruptcy. That is illegal! We can sue them and recover financial damages from them (it happens a lot). \n\nCLICK HERE TO SEE SPECIAL MESSAGE FROM MATT MCCUNE\n\nI'd really appreciate it if you would leave my firm a review on Google. It really helps with our marketing efforts.\n\nBest of luck in the future! It has been a pleasure working with you. \n\nLEAVE MCCUNE LEGAL A 5 STAR GOOGLE REVIEW\n"},
    {id:1777905945185,title:"Your Chapter 7 Case Has Been Closed",desc:"Your Chapter 7 Case Has Been Closed",subject:"Your Chapter 7 Case Has Been Closed",body:"Hi {{contact_first_name}},\n\nYour Chapter 7 bankruptcy case has now officially been closed by the court. Your discharge has already been entered, which means that many of your eligible unsecured debts have been permanently eliminated. This is the final step in the bankruptcy process, and we hope this gives you the opportunity for a true financial fresh start.\n\nPlease remember that certain categories of debt are generally not discharged in bankruptcy, including some student loans, certain taxes, domestic support obligations, and certain government fines or penalties. If you have questions regarding your student loans, please contact our office. In some situations, it may be possible to pursue a separate legal action called an adversary proceeding to seek relief from student loan debt.\n\nAs you move forward, one of the best ways to rebuild your credit is to make all future payments on time, keep credit balances low, regularly review your credit reports for accuracy, and avoid taking on unnecessary debt. Many clients are surprised by how quickly they are able to begin rebuilding their credit profile after bankruptcy.\n\nThank you again for allowing us to assist you through this process. If you have any questions in the future, please do not hesitate to contact our office."},
    {id:1777906586827,title:"Next Steps After Our Consultation #1",desc:"Next Steps After Our Consultation #1",subject:"Next Steps After Our Consultation",body:"Hi {{contact_first_name}},\n\nIt was good speaking with you earlier. Based on what we discussed, it sounds like bankruptcy may be a strong option to help you move forward.\n\nIf you'd like to proceed, the next step is to complete the intake and begin gathering documents so we can prepare your case efficiently.\n\nLet me know if you have any questions—I'm happy to help."},
    {id:1777906689067,title:"Next Steps After Our Consultation #2",desc:"Next Steps After Our Consultation #2",subject:"Following Up – You Have Options",body:"Hi {{contact_first_name}},\n\nI know this isn't an easy situation, and I appreciate you taking the time to speak with me.\n\nJust a quick note to follow up—if you decide to move forward, we can help guide you through the process step by step and make this as smooth as possible.\n\nNo pressure at all—just let me know how you'd like to proceed or if anything comes up."},
    {id:1777906751764,title:"Next Steps After Our Consultation #3",desc:"Next Steps After Our Consultation #3",subject:"Ready When You Are",body:"Hi {{contact_first_name}},\n\nJust checking in after our consultation.\n\nIf you're ready to move forward, getting started sooner typically puts you in a better position—especially if there are collection actions or deadlines approaching.\n\nWe can begin as soon as you're ready. Let me know and I'll send over the next steps."}
  ],
  sequences:[
    {id:1,title:"New Client Onboarding",desc:"5 steps • 8 active clients",meta:"Active"},

const TASK_STAGES=[];

const DEFAULT_TASK_TEMPLATES=[];



function PlaceholderPage({title}){
  return(<div style={{padding:"24px 28px",flex:1}}><h1 style={{fontSize:22,fontWeight:700,color:"#434343",marginBottom:20}}>{title}</h1>
    <div style={{background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",padding:60,textAlign:"center",color:"#999"}}>
      <h3 style={{fontSize:15,fontWeight:600,color:"#555",marginBottom:4}}>Coming Soon</h3><p style={{fontSize:13}}>This section is under development.</p>
    </div></div>);
}

/* ─── APP ROOT ─── */
function App(){
  const [matters,setMatters]=useLocalMatters();
  const [leads,setLeads]=useLocalLeads();
  const [standaloneContacts,setStandaloneContacts]=useLocalContacts();
  const [msgTemplates,setMsgTemplates]=useState(()=>{try{const s=localStorage.getItem("bkfl_lite_msg_templates");if(s)return JSON.parse(s);}catch(e){}return COMM_DEMO_DATA.messages.map(m=>({...m,subject:m.title,body:m.body||""}));});
  useEffect(()=>{try{localStorage.setItem("bkfl_lite_msg_templates",JSON.stringify(msgTemplates));}catch(e){}},[msgTemplates]);
  const [seqTemplates,setSeqTemplates]=useState(()=>{try{const s=localStorage.getItem("bkfl_lite_seq_templates");if(s)return JSON.parse(s);}catch(e){}return COMM_DEMO_DATA.sequences.map(s=>({...s,steps:s.steps||[]}));});
  useEffect(()=>{try{localStorage.setItem("bkfl_lite_seq_templates",JSON.stringify(seqTemplates));}catch(e){}},[seqTemplates]);
  const [autoTemplates,setAutoTemplates]=useState(()=>{try{const s=localStorage.getItem("bkfl_lite_auto_templates");if(s)return JSON.parse(s);}catch(e){}return [];});
  useEffect(()=>{try{localStorage.setItem("bkfl_lite_auto_templates",JSON.stringify(autoTemplates));}catch(e){}},[autoTemplates]);
  const [taskAutoTemplates,setTaskAutoTemplates]=useState(()=>{try{const s=localStorage.getItem("bkfl_lite_task_auto_templates");if(s)return JSON.parse(s);}catch(e){}return [];});
  useEffect(()=>{try{localStorage.setItem("bkfl_lite_task_auto_templates",JSON.stringify(taskAutoTemplates));}catch(e){}},[taskAutoTemplates]);
  const [page,setPage]=useState("dashboard");
  const [selectedMatter,setSelectedMatter]=useState(null);
  const [selectedLead,setSelectedLead]=useState(null);
  const [selectedContact,setSelectedContact]=useState(null);
  const [sidebarCollapsed,setSidebarCollapsed]=useState(false);
  const currentMatter=useMemo(()=>matters.find(m=>m.id===selectedMatter),[matters,selectedMatter]);
  const currentLead=useMemo(()=>leads.find(l=>l.id===selectedLead),[leads,selectedLead]);

  /* One-time cleanup: remove stale "Sequence started" comms from Matt McCune lead */
  useEffect(()=>{
    if(localStorage.getItem("bkfl_lite_seq_cleanup_done"))return;
    setLeads(prev=>prev.map(l=>{
      if(l.firstName==="Matt"&&l.lastName==="McCune"&&l.communications){
        const filtered=l.communications.filter(c=>!c.subject||!c.subject.startsWith("Sequence started:"));
        if(filtered.length!==l.communications.length)return{...l,communications:filtered,activeSequences:[]};
      }
      return l;
    }));
    localStorage.setItem("bkfl_lite_seq_cleanup_done","1");
  },[]);

  return(
    <React.Fragment>
      <Sidebar page={page} setPage={setPage} setSelectedMatter={setSelectedMatter} collapsed={sidebarCollapsed} setCollapsed={setSidebarCollapsed}/>
      <div style={{marginLeft:sidebarCollapsed?68:250,flex:1,display:"flex",flexDirection:"column",minHeight:"100vh",transition:"margin-left 0.25s ease"}}>
        {page!=="lead-detail"&&page!=="contact-detail"&&<TopBar leads={leads} setLeads={setLeads} matters={matters} setMatters={setMatters} standaloneContacts={standaloneContacts} setStandaloneContacts={setStandaloneContacts} setPage={setPage} setSelectedMatter={setSelectedMatter} setSelectedLead={setSelectedLead}/>}
        {page==="dashboard"&&<DashboardPage leads={leads} setLeads={setLeads} setPage={setPage} setSelectedLead={setSelectedLead}/>}
        {page==="leads"&&<LeadsPage leads={leads} setLeads={setLeads} matters={matters} setMatters={setMatters} setPage={setPage} setSelectedMatter={setSelectedMatter} setSelectedLead={setSelectedLead}/>}
        {page==="lead-detail"&&<LeadDetail lead={currentLead} setLeads={setLeads} setPage={setPage} setSelectedLead={setSelectedLead} matters={matters} setMatters={setMatters} setSelectedMatter={setSelectedMatter} setSelectedContact={setSelectedContact} msgTemplates={msgTemplates} seqTemplates={seqTemplates} commAutomations={autoTemplates}/>}
        {page==="contacts"&&<ContactsPage matters={matters} leads={leads} standaloneContacts={standaloneContacts} setPage={setPage} setSelectedMatter={setSelectedMatter} setSelectedLead={setSelectedLead} setSelectedContact={setSelectedContact}/>}
        {page==="contact-detail"&&selectedContact&&<ContactDetailPage contactId={selectedContact.id} contactSource={selectedContact.source} sourceId={selectedContact.sourceId} matters={matters} setMatters={setMatters} leads={leads} setLeads={setLeads} standaloneContacts={standaloneContacts} setStandaloneContacts={setStandaloneContacts} setPage={setPage} setSelectedMatter={setSelectedMatter} setSelectedLead={setSelectedLead} setSelectedContact={setSelectedContact}/>}
        {page==="settings"&&<SettingsPage/>}
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
