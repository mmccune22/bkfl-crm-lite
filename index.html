/* Build an empty customFields object from dynamic field definitions */
function buildEmptyCF(scope,bkType,overrides){
  const defs=(()=>{try{const s=localStorage.getItem("bkfl_lite_custom_fields");if(s)return JSON.parse(s);}catch(e){}return DEFAULT_CUSTOM_FIELDS;})();
  const obj={};
  defs.filter(f=>(f.scope===scope||f.scope==="both")&&(!f.bkType||f.bkType===bkType)).forEach(f=>{obj[f.key]="";});
  return {...obj,...(overrides||{})};
}

function useLocalMatters(){
  const [matters,setMatters]=useState(()=>{try{const s=localStorage.getItem("bkfl_lite_matters_v9");return s?JSON.parse(s):INITIAL_MATTERS;}catch{return INITIAL_MATTERS;}});

}

function useLocalContacts(){

/* ── Confirm Modal ── */
function ConfirmModal({open,title,message,confirmLabel,onConfirm,onCancel}){
  if(!open)return null;
  return(
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999}} onClick={onCancel}>
      <div style={{background:"#fff",borderRadius:12,padding:"28px 32px",width:420,maxWidth:"90vw",boxShadow:"0 12px 40px rgba(0,0,0,0.25)"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
          <div style={{width:40,height:40,borderRadius:10,background:"#fde8e8",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 9v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke="#dc3545" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </div>
          <h3 style={{fontSize:17,fontWeight:700,color:"#434343",margin:0}}>{title||"Confirm Delete"}</h3>
        </div>
        <p style={{fontSize:14,color:"#555",lineHeight:1.6,margin:"0 0 24px 0"}}>{message||"Are you sure? This action cannot be undone."}</p>
        <div style={{display:"flex",justifyContent:"flex-end",gap:10}}>
          <button onClick={onCancel} style={{padding:"9px 22px",fontSize:13,fontWeight:600,border:"1px solid #d0d0d0",borderRadius:8,background:"#fff",color:"#434343",cursor:"pointer"}}>Cancel</button>
          <button onClick={onConfirm} style={{padding:"9px 22px",fontSize:13,fontWeight:600,border:"none",borderRadius:8,background:"#dc3545",color:"#fff",cursor:"pointer"}}>{confirmLabel||"Delete"}</button>
        </div>
      </div>
    </div>
  );
}
function useConfirm(){
  const [state,setState]=React.useState({open:false,title:"",message:"",confirmLabel:"",resolve:null});
  const confirm=React.useCallback((opts)=>{
    return new Promise((resolve)=>{setState({open:true,title:opts.title||"Confirm Delete",message:opts.message||"Are you sure? This action cannot be undone.",confirmLabel:opts.confirmLabel||"Delete",resolve});});
  },[]);
  const handleConfirm=React.useCallback(()=>{if(state.resolve)state.resolve(true);setState(s=>({...s,open:false}));},[state.resolve]);
  const handleCancel=React.useCallback(()=>{if(state.resolve)state.resolve(false);setState(s=>({...s,open:false}));},[state.resolve]);
  const modal=React.createElement(ConfirmModal,{open:state.open,title:state.title,message:state.message,confirmLabel:state.confirmLabel,onConfirm:handleConfirm,onCancel:handleCancel});
  return [confirm,modal];
}

/* ─── TOP BAR ─── */
function TopBar({leads,setLeads,matters,setMatters,standaloneContacts,setStandaloneContacts,setPage,setSelectedMatter,setSelectedLead}){
  const dynamicLeadStages=LEAD_STAGES;
  const dynamicMatterStages=(()=>{try{const s=localStorage.getItem("bkfl_lite_matter_stages");if(s)return JSON.parse(s);}catch(e){}return MATTER_STAGES;})();
  const [showCreateMenu,setShowCreateMenu]=useState(false);
  const [showNewRecord,setShowNewRecord]=useState(null); // "Lead" or "Matter"
  const [showContactOnly,setShowContactOnly]=useState(false);
  const [contactOnlyForm,setContactOnlyForm]=useState({firstName:"",middleName:"",lastName:"",email:"",phone:"",role:"Other"});
  const [searchQuery,setSearchQuery]=useState("");
  const [searchFocused,setSearchFocused]=useState(false);

  const searchResults=useMemo(()=>{
    if(!searchQuery.trim())return[];
    const q=searchQuery.toLowerCase();
    const results=[];
    // Search matters by client name and email
    (matters||[]).forEach(m=>{
      const name=(m.clientFullName||m.clientName||"").toLowerCase();
      const email=(m.email||"").toLowerCase();
      if(name.includes(q)||email.includes(q)){
        results.push({type:"matter",id:m.id,name:m.clientFullName||m.clientName,email:m.email||"",sub:m.description||m.bankruptcyType,status:m.matterStage});
      }
    });
    // Search leads by name and email
    (leads||[]).forEach(l=>{
      const name=(l.firstName+" "+l.lastName).toLowerCase();
      const email=(l.email||"").toLowerCase();
      if(name.includes(q)||email.includes(q)){
        results.push({type:"lead",id:l.id,name:l.firstName+" "+l.lastName,email:l.email||"",sub:l.bankruptcyType,status:l.leadStage});
      }
    });
    return results.slice(0,8);
  },[searchQuery,matters,leads]);
  // Unified new record form state
  const [contactMode,setContactMode]=useState("new"); // "new" or "existing"
  const [selectedExistingContact,setSelectedExistingContact]=useState(null);
  const [contactSearch,setContactSearch]=useState("");
  const [newRecordForm,setNewRecordForm]=useState({firstName:"",middleName:"",lastName:"",email:"",phone:"",bankruptcyType:"Chapter 7",leadStage:"New Lead",notes:"",isJoint:false,sendIntake:false,joint:{firstName:"",middleName:"",lastName:"",email:"",phone:""}});
  // Gather all contacts from matters+leads+standalone for "existing contact" search
  const allContacts=useMemo(()=>{
    const cs=[];
    (matters||[]).forEach(m=>(m.contacts||[]).forEach(c=>cs.push({...c,source:"Matter",sourceName:m.clientFullName||m.clientName,sourceId:m.id})));
    (leads||[]).forEach(l=>(l.contacts||[]).forEach(c=>cs.push({...c,source:"Lead",sourceName:l.firstName+" "+l.lastName,sourceId:l.id})));
    (standaloneContacts||[]).forEach(c=>cs.push({...c,source:"Contact",sourceName:"Contact",sourceId:null}));
    // Deduplicate by name+email
    const seen=new Set();
    return cs.filter(c=>{const k=(c.name||"")+(c.email||"");if(seen.has(k))return false;seen.add(k);return true;});
  },[matters,leads,standaloneContacts]);
  const filteredContacts=useMemo(()=>{
    if(!contactSearch.trim())return allContacts.slice(0,8);
    const q=contactSearch.toLowerCase();
    return allContacts.filter(c=>(c.name||"").toLowerCase().includes(q)||(c.email||"").toLowerCase().includes(q)).slice(0,8);
  },[contactSearch,allContacts]);
  const resetNewRecordForm=()=>{setNewRecordForm({firstName:"",middleName:"",lastName:"",email:"",phone:"",bankruptcyType:"Chapter 7",leadStage:"New Lead",notes:"",isJoint:false,sendIntake:false,joint:{firstName:"",middleName:"",lastName:"",email:"",phone:""}});setContactMode("new");setSelectedExistingContact(null);setContactSearch("");};
  const inputStyle={width:"100%",padding:"10px 12px",fontSize:13,border:"1px solid #d0d0d0",borderRadius:6,outline:"none",fontFamily:"inherit"};
  const labelStyle={fontSize:12,fontWeight:600,color:"#555",marginBottom:4,display:"block"};
  return(
    <React.Fragment>
    <header style={{height:56,background:"#e7eae5",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 24px",position:"sticky",top:0,zIndex:15,borderBottom:"1px solid rgba(0,0,0,0.08)"}}>
      <div style={{flex:1,maxWidth:500,position:"relative"}}>
        <div style={{display:"flex",alignItems:"center",background:"rgba(0,0,0,0.06)",borderRadius:8,padding:"7px 14px",gap:8}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="rgba(0,0,0,0.35)" strokeWidth="1.8"/><path d="M21 21l-4.35-4.35" stroke="rgba(0,0,0,0.35)" strokeWidth="1.8" strokeLinecap="round"/></svg>
          <input type="text" value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} onFocus={()=>setSearchFocused(true)} onBlur={()=>setTimeout(()=>setSearchFocused(false),200)} placeholder="Search by name or email..." style={{border:"none",background:"transparent",outline:"none",fontSize:13,color:"#434343",width:"100%",fontFamily:"inherit"}}/>
          {searchQuery&&<div onClick={()=>setSearchQuery("")} style={{cursor:"pointer",color:"rgba(0,0,0,0.35)",fontSize:16,lineHeight:1}}>&times;</div>}
        </div>
        {searchFocused&&searchQuery.trim()&&(
          <div style={{position:"absolute",top:"100%",left:0,right:0,marginTop:6,background:"#fff",borderRadius:10,boxShadow:"0 6px 24px rgba(0,0,0,0.15)",border:"1px solid #e0e0e0",overflow:"hidden",zIndex:60,maxHeight:400,overflowY:"auto"}}>
            {searchResults.length===0&&(
              <div style={{padding:"20px 16px",textAlign:"center",color:"#999",fontSize:13}}>No results found for "{searchQuery}"</div>
            )}
            {searchResults.length>0&&searchResults.map((r,i)=>(
              <div key={r.type+"-"+r.id} onClick={()=>{
                if(r.type==="matter"){setSelectedMatter(r.id);setPage("leads");}
                else{setPage("leads");}
                setSearchQuery("");
              }} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",cursor:"pointer",borderBottom:i<searchResults.length-1?"1px solid #f0f0f0":"none"}} onMouseEnter={e=>e.currentTarget.style.background="#f9faf8"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                <div style={{width:34,height:34,borderRadius:"50%",background:r.type==="matter"?"#7a9c80":"#214e5f",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <span style={{color:"#fff",fontSize:12,fontWeight:700}}>{r.name.charAt(0)}</span>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,color:"#434343",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.name}</div>
                  <div style={{fontSize:11,color:"#999",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.email}{r.sub?" · "+r.sub:""}</div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                  <span style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.5px",color:r.type==="matter"?"#7a9c80":"#214e5f",background:r.type==="matter"?"#eef3ef":"#e8eff2",padding:"3px 8px",borderRadius:4}}>{r.type}</span>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <button onClick={()=>{resetNewRecordForm();setContactMode("new");setShowNewRecord("Lead");}} style={{background:"#7a9c80",color:"#fff",border:"none",borderRadius:6,padding:"7px 18px",fontSize:13,fontWeight:500,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>Create New Lead <span style={{fontSize:16}}>+</span></button>
      </div>
    </header>
    {/* Unified New Lead / Matter Modal */}
    {showNewRecord&&(
      <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:50}} onClick={()=>setShowNewRecord(null)}>
        <div style={{background:"#fff",borderRadius:12,padding:"28px 32px",width:540,maxWidth:"90vw",maxHeight:"90vh",overflowY:"auto",boxShadow:"0 8px 32px rgba(0,0,0,0.2)"}} onClick={e=>e.stopPropagation()}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <h3 style={{fontSize:18,fontWeight:700,color:"#434343",margin:0}}>New {showNewRecord}</h3>
            <div style={{cursor:"pointer",fontSize:20,color:"#999",lineHeight:1}} onClick={()=>setShowNewRecord(null)}>&times;</div>
          </div>
          {/* Contact Mode Toggle */}
          <div style={{marginBottom:18}}>
            <label style={labelStyle}>Contact</label>
            <div style={{display:"flex",borderRadius:8,overflow:"hidden",border:"1px solid #d0d0d0"}}>
              {[{k:"new",l:"New Contact"},{k:"existing",l:"Existing Contact"}].map(o=>(
                <div key={o.k} onClick={()=>{setContactMode(o.k);if(o.k==="new")setSelectedExistingContact(null);}} style={{flex:1,padding:"10px 0",textAlign:"center",fontSize:13,fontWeight:600,cursor:"pointer",background:contactMode===o.k?"#7a9c80":"#fff",color:contactMode===o.k?"#fff":"#434343",transition:"all 0.15s"}}>
                  {o.l}
                </div>

  );

    return <span onClick={()=>{setEditField(field);setEditVal(value||"");}} style={{cursor:"pointer"}} title="Click to edit">{value||"—"}</span>;
  };

  const startEdit=(f,v)=>{setEditField(f);setEditVal(v||"");};
  const saveEdit=(f,isCF)=>{if(isCF)updateCF(f,editVal);else update({[f]:editVal});setEditField(null);};

  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:"100vh"}}>
      <div style={{background:"#fff",borderBottom:"1px solid #e0e0e0",padding:"20px 28px 0"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:4}}>
          <button onClick={()=>{setPage("leads");setSelectedLead(null);}} style={{background:"none",border:"none",cursor:"pointer",padding:0,display:"flex"}}><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="#7A9C80" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg></button>
          <h1 style={{fontSize:22,fontWeight:700,color:"#434343",margin:0}}>{lead.firstName} {lead.lastName}</h1>
          <StageBadge stage={lead.leadStage}/>
        </div>
        <p style={{color:"#666",fontSize:13,marginBottom:16,paddingLeft:32}}>{lead.bankruptcyType} Lead</p>
        {tab==="dashboard"&&<div style={{display:"flex",gap:8,marginBottom:16,paddingLeft:32}}>
          <button style={{padding:"7px 16px",borderRadius:6,fontSize:13,fontWeight:500,cursor:"pointer",background:"#fff",color:"#434343",border:"1px solid #d0d0d0"}}>Share</button>
          {lead.leadStage==="New Lead"&&<button onClick={()=>{
            const _t=new Date().toISOString().split("T")[0];
            const comm={id:Date.now(),date:_t,type:"Email",direction:"Outgoing",subject:"Your intake form link",body:"Hi "+lead.firstName+", here is your secure intake form link: https://intake.mccunelegal.com/form/lead-intake",to:lead.firstName+" "+lead.lastName,email:lead.email||""};
            const _due=new Date(Date.now()+7*86400000).toISOString().split("T")[0];
            update({leadStage:"Intake Sent",intakeSentDate:_t,communications:[comm,...(lead.communications||[])],tasks:[{id:Date.now()+2,title:"Approve follow-up email — intake not completed",due:_due,status:"Pending",assignee:"Matt McCune",stage:"Intake Sent",recurring:true},...(lead.tasks||[])],timeline:[{id:Date.now()+1,date:_t,action:"Intake link sent",detail:"Status: New Lead → Intake Sent",user:"Matt McCune"},...(lead.timeline||[])]});
          }} style={{padding:"7px 16px",borderRadius:6,fontSize:13,fontWeight:600,cursor:"pointer",background:"#7A9C80",color:"#fff",border:"none"}}>Send Intake Link</button>}
          {lead.leadStage==="Intake Sent"&&<button onClick={()=>{
            const _t=new Date().toISOString().split("T")[0];
            const _week=new Date(Date.now()+7*86400000).toISOString().split("T")[0];
            const _tomorrow=new Date(Date.now()+86400000).toISOString().split("T")[0];
            const closed=(lead.tasks||[]).map(tk=>tk.status!=="Completed"&&tk.stage==="Intake Sent"?{...tk,status:"Completed",completedDate:_t}:tk);
            const genChecklist=(lead.docChecklist&&lead.docChecklist.length)?lead.docChecklist:DOC_TYPES.filter(d=>d.group==="all"&&d.when==="Always"&&d.req!=="optional").map((d,i)=>d.req==="required"?(d.id==="bank_statements"?{id:i+1,docId:d.id,status:"ai_flagged",aiNote:"Only 3 of 6 months present",fileName:"bank-statements.pdf",date:_t}:{id:i+1,docId:d.id,status:"ai_accepted",aiNote:"Passed AI analysis",fileName:d.id.replace(/_/g,"-")+".pdf",date:_t}):{id:i+1,docId:d.id,status:"open"});
            update({leadStage:"Intake Submitted",intakeSubmittedDate:_t,docChecklist:genChecklist,tasks:[{id:Date.now()+2,title:"Review & approve AI intake report email",due:_tomorrow,status:"Pending",assignee:"Matt McCune",stage:"Intake Submitted"},{id:Date.now()+3,title:"Approve document follow-up request",due:_week,status:"Pending",assignee:"Matt McCune",stage:"Intake Submitted",recurring:true},...closed],timeline:[{id:Date.now()+1,date:_t,action:"Intake submitted",detail:"Status: Intake Sent → Intake Submitted",user:"System"},...(lead.timeline||[])]});
          }} style={{padding:"7px 16px",borderRadius:6,fontSize:13,fontWeight:500,cursor:"pointer",background:"#fff",color:"#888",border:"1px dashed #bbb"}}>Simulate Submission (dev)</button>}
          <button onClick={()=>openEdit(lead)} style={{padding:"7px 16px",borderRadius:6,fontSize:13,fontWeight:500,cursor:"pointer",background:"#7A9C80",color:"#fff",border:"none"}}>Edit Lead</button>
        </div>}
        <div style={{display:"flex",gap:0,overflowX:"auto",paddingLeft:32}}>
          {tabs.map(t=><button key={t.key} onClick={()=>setTab(t.key)} style={{padding:"10px 18px",fontSize:13,fontWeight:tab===t.key?600:400,cursor:"pointer",color:tab===t.key?"#7A9C80":"#666",background:"none",border:"none",borderBottom:tab===t.key?"3px solid #7A9C80":"3px solid transparent",whiteSpace:"nowrap"}}>{t.label}</button>)}
        </div>
      </div>

      <div style={{padding:"20px 28px",flex:1,background:"#FBFAF7",overflowY:"auto"}}>
        {tab==="dashboard"&&(<div>
          <Widget title="Lead Details">
            <DetailRow label="First name" value={lead.firstName}/>
            <DetailRow label="Last name" value={lead.lastName}/>
            <DetailRow label="Email" value={<span style={{userSelect:"all",cursor:"text"}}>{lead.email}</span>}/>
            <DetailRow label="Phone" value={<span style={{userSelect:"all",cursor:"text"}}>{lead.phone}</span>}/>
            <DetailRow label="Stage" value={<span><StageBadge stage={lead.leadStage}/><span style={{fontSize:11,color:"#999",marginLeft:8,fontStyle:"italic"}}>set automatically</span></span>}/>
            <DetailRow label="Intake sent" value={lead.intakeSentDate?new Date(lead.intakeSentDate+"T12:00:00").toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"}):"—"}/>
            <DetailRow label="Intake submitted" value={lead.intakeSubmittedDate?new Date(lead.intakeSubmittedDate+"T12:00:00").toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"}):"—"}/>
            <DetailRow label="Created" value={lead.createdDate?new Date(lead.createdDate+"T12:00:00").toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"}):""}/>
            <DetailRow label="Notes" value={<EditVal field="leadNotes" value={lead.leadNotes}/>}/>
          </Widget>
          <Widget title="Contacts">
            {lead.contacts.map(c=>(<div key={c.id} style={{display:"flex",alignItems:"center",gap:14,padding:"10px 0",borderBottom:"1px solid #f5f5f5"}}>
              <div style={{width:38,height:38,borderRadius:"50%",background:"#E7EAE5",color:"#7A9C80",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:600}}>{c.name.split(" ").map(n=>n[0]).join("").slice(0,2)}</div>
              <div style={{flex:1}}><div onClick={()=>{setSelectedContact({id:c.id,source:"Lead",sourceId:lead.id});setPage("contact-detail");}} style={{fontSize:14,fontWeight:500,color:"#7A9C80",cursor:"pointer",textDecoration:"none"}} onMouseEnter={e=>e.currentTarget.style.textDecoration="underline"} onMouseLeave={e=>e.currentTarget.style.textDecoration="none"}>{c.name}</div></div>
              <div style={{fontSize:14,color:"#555",userSelect:"all",cursor:"text"}}>{c.email}</div>
              <div style={{fontSize:14,color:"#555",userSelect:"all",cursor:"text"}}>{c.phone}</div>
            </div>))}
          </Widget>
        </div>)}

        {tab==="notes"&&(<div>
          <div style={{background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",padding:20,marginBottom:16}}>
            <textarea value={newNote} onChange={e=>setNewNote(e.target.value)} placeholder="Add a note..." rows={3} style={{width:"100%",padding:12,borderRadius:6,border:"1px solid #d0d0d0",fontSize:14,outline:"none",resize:"vertical",fontFamily:"inherit"}}/>
            <div style={{display:"flex",justifyContent:"flex-end",marginTop:8}}><button onClick={addNote} disabled={!newNote.trim()} style={{background:newNote.trim()?"#7A9C80":"#ccc",color:"#fff",border:"none",borderRadius:6,padding:"8px 20px",fontSize:13,cursor:newNote.trim()?"pointer":"default"}}>Save Note</button></div>
          </div>
          {lead.notes.map(n=>(<div key={n.id} style={{background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",padding:20,marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:14,fontWeight:600,color:"#434343"}}>{n.author}</span><span style={{fontSize:12,color:"#999"}}>{n.date?new Date(n.date+"T12:00:00").toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"}):""}</span></div>
            <p style={{fontSize:14,color:"#555",lineHeight:1.6,margin:0}}>{n.text}</p>
          </div>))}
        </div>)}

        {tab==="documents"&&(()=>{
          const checklist=lead.docChecklist||[];
          const dName=(d)=>d.customName||docMeta(d.docId).name;
          const isNotNeeded=(d)=>d.status==="reason_given"&&!CHASE_REASONS.includes(d.reason);
          const isChase=(d)=>d.status==="open"||(d.status==="reason_given"&&CHASE_REASONS.includes(d.reason));
          const buckets={
            firm:checklist.filter(d=>d.status==="approved"),
            ai:checklist.filter(d=>d.status==="ai_accepted"),
            flagged:checklist.filter(d=>d.status==="ai_flagged"),
            rejected:checklist.filter(d=>d.status==="open"&&d.reason==="rejected"),
            na:checklist.filter(isNotNeeded),
            awaiting:checklist.filter(d=>isChase(d)&&d.reason!=="rejected"),
            total:checklist,
          };
          const bucketInfo={
            firm:"Home base. Every document a case needs ends up here — uploaded, accepted by the AI analysis, and manually approved by your firm. Nothing counts as done until it is in this list.",
            ai:"Uploaded and passed the AI document analysis. Each one still needs a member of your firm to open it and approve it — every document requires firm approval, no exceptions.",
            flagged:"Uploaded, but the AI analysis found a problem — wrong document, missing pages, or unreadable. Review each one yourself: approve it if the AI got it wrong, or reject it to request a replacement.",
            rejected:"Uploaded, reviewed, and rejected by your firm — with your reason attached. Each is re-requested from the debtor, reason included, in the next follow-up email — and then moves to Awaiting Upload.",
            na:"Documents the debtor told us they cannot provide, in their own words from the intake. Reasons like “I didn\u2019t file” or “I don\u2019t have a copy” are flagged for attorney judgment.",
            awaiting:"Not yet received — never uploaded or promised for later. Together with Rejected, this is what goes into the next follow-up email below.",
            total:"Every document on this case, in every state.",
          };
          const shown=buckets[docFilter]||checklist;
          const patchDoc=(id,patch)=>update({docChecklist:checklist.map(d=>d.id===id?{...d,...patch}:d)});
          const pickFile=(cb)=>{const el=document.createElement("input");el.type="file";el.onchange=()=>{const fl=el.files&&el.files[0];if(fl)cb(fl.name);};el.click();};
          const today=new Date().toISOString().split("T")[0];
          const addOther=()=>pickFile(nm=>update({docChecklist:[...checklist,{id:Date.now(),docId:"other_docs",status:"ai_accepted",aiNote:"Passed AI analysis",fileName:nm,date:today}]}));
          const chase=buckets.awaiting;
          const flaggedNA=checklist.filter(d=>d.status==="reason_given"&&REVIEW_REASONS.includes(d.reason));
          const toReview=buckets.ai.length+buckets.flagged.length;
          const availableToRequest=DOC_TYPES.filter(dt=>!checklist.some(c=>c.docId===dt.id));
          const saveReject=(d)=>{patchDoc(d.id,{status:"open",reason:"rejected",note:rejectNote||"Needs to be re-uploaded",rejectedFile:d.fileName,fileName:undefined,date:undefined,aiNote:undefined});setRejectingDoc(null);setRejectNote("");};
          const addRequest=()=>{
            if(requestDocId==="custom"&&!requestCustom.trim())return;
            if(!requestDocId)return;
            const item=requestDocId==="custom"
              ?{id:Date.now(),docId:"custom",customName:requestCustom.trim(),status:"open",manual:true}
              :{id:Date.now(),docId:requestDocId,status:"open",manual:true};
            update({docChecklist:[...checklist,item]});
            setAddingRequest(false);setRequestDocId("");setRequestCustom("");
          };
          const sendFollowUp=()=>{
            if(!chase.length)return;
            const listText=chase.map(d=>"• "+dName(d)+(d.reason==="rejected"&&d.note?" — "+d.note:d.reason&&DOC_REASONS[d.reason]?" ("+DOC_REASONS[d.reason]+")":"")).join("\n");
            const comm={id:Date.now(),date:today,type:"Email",direction:"Outgoing",subject:"A few documents we still need",body:"Hi "+lead.firstName+",\n\nThanks again for submitting your intake. To keep your case moving, we still need the following:\n\n"+listText+"\n\nYou can upload these through your secure portal.\n\nMatt McCune",to:lead.firstName+" "+lead.lastName,email:lead.email||""};
            const next=new Date(Date.now()+7*86400000).toISOString().split("T")[0];
            let tasks=(lead.tasks||[]);
            const openTask=tasks.find(tk=>tk.status!=="Completed"&&tk.title==="Approve document follow-up request");
            if(openTask){
              tasks=tasks.map(tk=>tk.id===openTask.id?{...tk,status:"Completed",completedDate:today}:tk);
              tasks=[{...openTask,id:Date.now()+5,status:"Pending",due:next,completedDate:undefined},...tasks];
            }
            update({
              docChecklist:checklist.map(d=>isChase(d)?(d.reason==="rejected"?{...d,requestedDate:today,reason:undefined}:{...d,requestedDate:today}):d),
              communications:[comm,...(lead.communications||[])],
              tasks,
              timeline:[{id:Date.now()+1,date:today,action:"Document follow-up sent",detail:chase.length+" document"+(chase.length===1?"":"s")+" requested",user:"Matt McCune"},...(lead.timeline||[])]
            });
          };
          const btn={padding:"4px 10px",fontSize:11,fontWeight:600,borderRadius:5,cursor:"pointer",border:"1px solid #d0d0d0",background:"#fff",color:"#555"};
          return(<div>
            {/* ── Intake Document Submissions ── */}
            <div style={{background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",overflow:"hidden",marginBottom:16}}>
              <div style={{padding:"14px 20px",borderBottom:"1px solid #eee",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:14,fontWeight:700,color:"#434343"}}>Intake Document Submissions</span>
                  {toReview>0&&<span style={{background:"#F59E0B",color:"#fff",borderRadius:10,padding:"1px 8px",fontSize:11,fontWeight:700}}>{toReview} awaiting firm approval</span>}
                </div>
                <button onClick={addOther} style={{...btn,background:"#7a9c80",color:"#fff",border:"none",padding:"6px 14px",fontSize:12}}>Upload Document</button>
              </div>
              {checklist.length===0?(
                <div style={{padding:24,textAlign:"center",color:"#999",fontSize:13,lineHeight:1.6}}>The document checklist is created automatically when the debtor submits their intake.<br/>You can still upload documents manually with the button above.</div>
              ):(<React.Fragment>
              <div style={{display:"flex",gap:0,borderBottom:"1px solid #eee",background:"#FBFAF7",flexWrap:"wrap"}}>
                {[{k:"firm",l:"Approved by Firm"},{k:"ai",l:"Accepted by AI"},{k:"flagged",l:"AI Flagged"},{k:"rejected",l:"Rejected"},{k:"na",l:"Not Applicable"},{k:"awaiting",l:"Awaiting Upload"},{k:"total",l:"Total"}].map(f=>(
                  <button key={f.k} onClick={()=>setDocFilter(f.k)} style={{padding:"9px 14px",fontSize:12,fontWeight:600,border:"none",borderBottom:docFilter===f.k?"2px solid #7a9c80":"2px solid transparent",background:"transparent",color:docFilter===f.k?"#3d5c43":((f.k==="ai"||f.k==="flagged")&&buckets[f.k].length>0?"#F59E0B":"#888"),cursor:"pointer"}}>{f.l} ({buckets[f.k].length})</button>
                ))}
              </div>
              <div style={{padding:"9px 20px",borderBottom:"1px solid #f0f0f0",fontSize:11.5,color:"#999",fontStyle:"italic",lineHeight:1.5}}>{bucketInfo[docFilter]}</div>
              <div style={{maxHeight:440,overflowY:"auto"}}>
                {shown.map(d=>{
                  const meta=docMeta(d.docId);
                  const rb=reqBadge[meta.req]||reqBadge.optional;
                  const underReview=d.status==="ai_accepted"||d.status==="ai_flagged";
                  return(
                  <React.Fragment key={d.id}>
                  <div style={{display:"flex",alignItems:"center",gap:12,padding:"11px 20px",borderBottom:"1px solid #f5f5f5",background:d.status==="ai_flagged"?"#fdf6f0":d.status==="ai_accepted"?"#fffcf5":"transparent"}}>
                    <div style={{width:16,flexShrink:0}}>
                      {d.status==="approved"&&<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M22 11.08V12a10 10 0 11-5.93-9.14" stroke="#7a9c80" strokeWidth="2" strokeLinecap="round"/><path d="M22 4L12 14.01l-3-3" stroke="#7a9c80" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                      {d.status==="ai_accepted"&&<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="#F59E0B" strokeWidth="2"/><circle cx="12" cy="12" r="3" stroke="#F59E0B" strokeWidth="2"/></svg>}
                      {d.status==="ai_flagged"&&<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 9v2m0 4h.01M10.29 3.86l-8.58 14.88A1 1 0 002.59 20h18.82a1 1 0 00.87-1.5L13.71 3.86a1 1 0 00-1.74 0z" stroke="#dc3545" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                      {isChase(d)&&<div style={{width:14,height:14,borderRadius:"50%",border:"2px solid "+(d.reason==="rejected"?"#dc3545":"#F59E0B")}}/>}
                      {isNotNeeded(d)&&<div style={{width:14,height:14,borderRadius:"50%",border:"2px solid #ccc",background:"#f0f0ed"}}/>}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div onClick={()=>d.fileName&&setPreviewDoc(previewDoc===d.id?null:d.id)} style={{fontSize:13,fontWeight:600,color:"#434343",cursor:d.fileName?"pointer":"default"}}>{dName(d)}{d.manual&&<span style={{fontSize:10,color:"#999",fontWeight:400,marginLeft:6}}>(added by staff)</span>}</div>
                      <div style={{fontSize:11,color:"#999",marginTop:1}}>
                        {d.status==="approved"&&(d.fileName?d.fileName+" · approved by firm "+(d.approvedDate||""):"Approved")}
                        {d.status==="ai_accepted"&&<span style={{color:"#b8963e",fontWeight:600}}>{d.fileName} · AI accepted{d.aiNote?" — "+d.aiNote:""} · awaiting firm approval</span>}
                        {d.status==="ai_flagged"&&<span style={{color:"#dc3545",fontWeight:600}}>{d.fileName} · AI flagged — {d.aiNote||"needs your review"}</span>}
                        {d.status==="open"&&(d.reason==="rejected"
                          ?<span><span style={{color:"#dc3545",fontWeight:600}}>Rejected by firm</span>{d.note?" — "+d.note:""}{d.requestedDate?" · re-requested "+d.requestedDate:""}</span>
                          :<span>{"Not yet received"}{d.requestedDate?" · requested "+d.requestedDate:""}</span>)}
                        {d.status==="reason_given"&&<span>Debtor: “{DOC_REASONS[d.reason]||d.reason}”{REVIEW_REASONS.includes(d.reason)&&<span style={{marginLeft:6,padding:"1px 6px",borderRadius:3,fontSize:10,fontWeight:700,background:"#fde8e8",color:"#c0392b"}}>ATTORNEY REVIEW</span>}</span>}
                      </div>
                    </div>
                    <span style={{padding:"2px 8px",borderRadius:4,fontSize:10,fontWeight:700,background:rb.bg,color:rb.text,border:"1px solid "+rb.border,flexShrink:0}}>{rb.label}</span>
                    <div style={{display:"flex",gap:6,flexShrink:0}}>
                      {underReview&&<React.Fragment>
                        <button onClick={()=>patchDoc(d.id,{status:"approved",approvedDate:today})} style={{...btn,background:"#7a9c80",color:"#fff",border:"none"}}>{d.status==="ai_flagged"?"Approve Anyway":"Approve"}</button>
                        <button onClick={()=>{setRejectingDoc(rejectingDoc===d.id?null:d.id);setRejectNote("");}} style={{...btn,color:"#dc3545",border:"1px solid #f5b7b1"}}>Reject</button>
                        <button onClick={()=>patchDoc(d.id,{status:"reason_given",reason:"doesnt_apply"})} style={btn}>Not needed</button>
                      </React.Fragment>}
                      {d.status==="open"&&<React.Fragment>
                        <button onClick={()=>pickFile(nm=>patchDoc(d.id,{status:"ai_accepted",aiNote:"Passed AI analysis",fileName:nm,date:today,reason:undefined,note:undefined}))} style={btn}>Upload</button>
                        <button onClick={()=>patchDoc(d.id,{status:"reason_given",reason:"doesnt_apply"})} style={btn}>Not needed</button>
                      </React.Fragment>}
                      {d.status==="reason_given"&&<React.Fragment>
                        <button onClick={()=>patchDoc(d.id,{status:"open",reason:undefined})} style={btn}>Reopen</button>
                        <button onClick={()=>pickFile(nm=>patchDoc(d.id,{status:"ai_accepted",aiNote:"Passed AI analysis",fileName:nm,date:today,reason:undefined}))} style={btn}>Upload</button>
                      </React.Fragment>}
                      {d.status==="approved"&&<button onClick={()=>patchDoc(d.id,{status:"ai_accepted",approvedDate:undefined})} style={{...btn,color:"#999"}}>Re-review</button>}
                    </div>
                  </div>
                  {previewDoc===d.id&&d.fileName&&(
                    <div style={{padding:"14px 20px 14px 48px",background:"#f7f7f4",borderBottom:"1px solid #f0f0f0"}}>
                      <div style={{border:"1px dashed #ccc",borderRadius:8,padding:"28px 20px",textAlign:"center",background:"#fff"}}>
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" style={{opacity:0.35}}><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke="#434343" strokeWidth="1.5"/><path d="M14 2v6h6" stroke="#434343" strokeWidth="1.5"/></svg>
                        <div style={{fontSize:13,fontWeight:600,color:"#666",marginTop:8}}>{d.fileName}</div>
                        {d.aiNote&&<div style={{fontSize:12,color:d.status==="ai_flagged"?"#dc3545":"#7a9c80",marginTop:6,fontWeight:600}}>AI analysis: {d.aiNote}</div>}
                        <div style={{fontSize:11,color:"#aaa",marginTop:4}}>Inline PDF preview — available in the production build</div>
                      </div>
                    </div>
                  )}
                  {rejectingDoc===d.id&&(
                    <div style={{display:"flex",gap:8,alignItems:"center",padding:"10px 20px 12px 48px",background:"#fdf3f3",borderBottom:"1px solid #f0f0f0"}}>
                      <input autoFocus value={rejectNote} onChange={ev=>setRejectNote(ev.target.value)} onKeyDown={ev=>{if(ev.key==="Enter")saveReject(d);}} placeholder='Why is it being rejected? e.g. "Only shows March — we need all 6 months"' style={{flex:1,padding:"8px 10px",fontSize:12,border:"1px solid #f5b7b1",borderRadius:6,outline:"none",fontFamily:"inherit"}}/>
                      <button onClick={()=>saveReject(d)} style={{...btn,background:"#dc3545",color:"#fff",border:"none"}}>Reject &amp; Re-request</button>
                      <button onClick={()=>{setRejectingDoc(null);setRejectNote("");}} style={btn}>Cancel</button>
                    </div>
                  )}
                  </React.Fragment>);
                })}
                {shown.length===0&&<div style={{padding:20,textAlign:"center",color:"#bbb",fontSize:12}}>Nothing in this bucket.</div>}
              </div>
              </React.Fragment>)}
            </div>

            {/* ── Next Follow-Up Email — lives with Awaiting Upload only ── */}
            {(docFilter==="awaiting"||docFilter==="rejected")&&checklist.length>0&&(
              <div style={{background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",overflow:"hidden"}}>
                <div style={{padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
                  <div>
                    <div style={{fontSize:14,fontWeight:700,color:"#434343"}}>Next Follow-Up Email</div>
                    <div style={{fontSize:11.5,color:"#999",marginTop:2,fontStyle:"italic"}}>{chase.length?("Sends the "+chase.length+" item"+(chase.length===1?"":"s")+" above in the AI-drafted follow-up email — nothing is sent until you approve it."):"Nothing left to request — all documents are in or accounted for."}</div>
                  </div>
                  <div style={{display:"flex",gap:8,flexShrink:0}}>
                    <button onClick={()=>setAddingRequest(!addingRequest)} style={btn}>+ Request a Document</button>
                    <button onClick={sendFollowUp} disabled={!chase.length} style={{...btn,background:chase.length?"#7a9c80":"#ccc",color:"#fff",border:"none",padding:"6px 14px",fontSize:12,cursor:chase.length?"pointer":"default"}}>Approve &amp; Send Follow-Up{chase.length?" ("+chase.length+")":""}</button>
                  </div>
                </div>
                {addingRequest&&(
                  <div style={{display:"flex",gap:8,alignItems:"center",padding:"12px 20px",background:"#FBFAF7",borderTop:"1px solid #eee"}}>
                    <select value={requestDocId} onChange={ev=>setRequestDocId(ev.target.value)} style={{padding:"8px 10px",fontSize:12,border:"1px solid #d0d0d0",borderRadius:6,background:"#fff",maxWidth:320}}>
                      <option value="">Choose a document type...</option>
                      {availableToRequest.map(dt=><option key={dt.id} value={dt.id}>{dt.name}</option>)}
                      <option value="custom">Other (type it in)</option>
                    </select>
                    {requestDocId==="custom"&&<input value={requestCustom} onChange={ev=>setRequestCustom(ev.target.value)} placeholder="Name the document..." style={{flex:1,padding:"8px 10px",fontSize:12,border:"1px solid #d0d0d0",borderRadius:6,outline:"none",fontFamily:"inherit"}}/>}
                    <button onClick={addRequest} style={{...btn,background:"#7a9c80",color:"#fff",border:"none"}}>Add to Request List</button>
                  </div>
                )}
              </div>
            )}
          </div>);
        })()}

        {tab==="tasks"&&(()=>{
          const allTasks=lead.tasks||[];
          const outstanding=allTasks.filter(t=>t.status!=="Completed");
          const completed=allTasks.filter(t=>t.status==="Completed");
          const filtered=taskFilter==="outstanding"?outstanding:completed;
          const assigneeOptions=[...ATTORNEYS,...STAFF,...(lead.contacts||[]).map(c=>c.name)].filter((v,i,a)=>a.indexOf(v)===i);
          return(<div>
            {/* Header */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <h3 style={{fontSize:16,fontWeight:600,color:"#434343",margin:0}}>Tasks</h3>
              <button onClick={()=>setShowNewTask(!showNewTask)} style={{padding:"8px 20px",fontSize:13,fontWeight:600,border:"none",borderRadius:6,background:showNewTask?"#f0f0f0":"#7A9C80",color:showNewTask?"#666":"#fff",cursor:"pointer"}}>{showNewTask?"Cancel":"New Task"}</button>
            </div>

            {/* New Task Form */}
            {showNewTask&&(
              <div style={{background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",padding:20,marginBottom:16}}>
                {/* Task Mode Toggle */}
                <div style={{display:"flex",gap:0,marginBottom:16}}>
                  <button onClick={()=>setTaskMode("custom")} style={{flex:1,padding:"10px 16px",fontSize:13,fontWeight:600,border:"1px solid #d0d0d0",borderRadius:"6px 0 0 6px",background:taskMode==="custom"?"#7A9C80":"#fff",color:taskMode==="custom"?"#fff":"#555",cursor:"pointer",transition:"all 0.15s"}}>Assign Custom Task</button>
                  <button onClick={()=>setTaskMode("built")} style={{flex:1,padding:"10px 16px",fontSize:13,fontWeight:600,border:"1px solid #d0d0d0",borderLeft:"none",borderRadius:"0 6px 6px 0",background:taskMode==="built"?"#7A9C80":"#fff",color:taskMode==="built"?"#fff":"#555",cursor:"pointer",transition:"all 0.15s"}}>Assign Built Task</button>
                </div>

                {/* Custom Task Form */}
                {taskMode==="custom"&&(
                <div style={{display:"flex",flexDirection:"column",gap:12}}>
                  <div>
                    <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>Task Name</label>
                    <input value={newTaskTitle} onChange={e=>setNewTaskTitle(e.target.value)} placeholder="Task name..." style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,outline:"none",boxSizing:"border-box"}}/>
                  </div>
                  <div>
                    <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>Description</label>
                    <textarea value={newTaskDesc} onChange={e=>setNewTaskDesc(e.target.value)} placeholder="Task description (optional)..." rows={2} style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,outline:"none",resize:"vertical",fontFamily:"inherit",boxSizing:"border-box"}}/>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                    <div>
                      <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>Due Date</label>
                      <input type="date" value={newTaskDue} onChange={e=>setNewTaskDue(e.target.value)} style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,boxSizing:"border-box"}}/>
                    </div>
                    <div>
                      <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>Assign To</label>
                      <select value={newTaskAssignee} onChange={e=>setNewTaskAssignee(e.target.value)} style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,background:"#fff"}}>
                        {assigneeOptions.map(a=><option key={a} value={a}>{a}</option>)}
                      </select>
                    </div>
                  </div>
                  <div style={{display:"flex",justifyContent:"flex-end",marginTop:4}}>
                    <button onClick={addTask} disabled={!newTaskTitle.trim()} style={{padding:"8px 24px",fontSize:13,fontWeight:600,border:"none",borderRadius:6,background:newTaskTitle.trim()?"#7A9C80":"#ccc",color:"#fff",cursor:newTaskTitle.trim()?"pointer":"default"}}>Save Task</button>
                  </div>
                </div>
                )}

                {/* Built Task Form */}
                {taskMode==="built"&&(
                <div style={{display:"flex",flexDirection:"column",gap:12}}>
                  <div>
                    <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>Select Task</label>
                    <select value={selectedBuiltTask} onChange={e=>setSelectedBuiltTask(e.target.value)} style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,background:"#fff"}}>
                      <option value="">Choose a task...</option>
                      {BUILT_TASK_CATEGORIES.map(cat=>(
                        <optgroup key={cat} label={cat}>{BUILT_TASKS.filter(t=>t.category===cat).map(t=><option key={t.title} value={t.title}>{t.title}</option>)}</optgroup>
                      ))}
                    </select>
                  </div>
                  {selectedBuiltTask&&(
                    <div style={{fontSize:12,color:"#666",background:"#f8f9f6",padding:"8px 12px",borderRadius:6,border:"1px solid #e7eae5"}}>
                      Priority: <strong style={{color:"#3d5c43"}}>{BUILT_TASKS.find(t=>t.title===selectedBuiltTask)?.priority}</strong> &middot; Category: <strong style={{color:"#3d5c43"}}>{BUILT_TASKS.find(t=>t.title===selectedBuiltTask)?.category}</strong>
                    </div>
                  )}
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                    <div>
                      <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>Due Date</label>
                      <input type="date" value={builtTaskDue} onChange={e=>setBuiltTaskDue(e.target.value)} style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,boxSizing:"border-box"}}/>
                    </div>
                    <div>
                      <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>Assign To</label>
                      <select value={builtTaskAssignee} onChange={e=>setBuiltTaskAssignee(e.target.value)} style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,background:"#fff"}}>
                        {assigneeOptions.map(a=><option key={a} value={a}>{a}</option>)}
                      </select>
                    </div>
                  </div>
                  <div style={{display:"flex",justifyContent:"flex-end",marginTop:4}}>
                    <button onClick={addBuiltTask} disabled={!selectedBuiltTask} style={{padding:"8px 24px",fontSize:13,fontWeight:600,border:"none",borderRadius:6,background:selectedBuiltTask?"#7A9C80":"#ccc",color:"#fff",cursor:selectedBuiltTask?"pointer":"default"}}>Save Task</button>
                  </div>
                </div>
                )}
              </div>
            )}

            {/* Outstanding / Completed filter */}
            <div style={{display:"flex",gap:6,marginBottom:16}}>
              {[{key:"outstanding",label:"Outstanding",count:outstanding.length},{key:"completed",label:"Completed",count:completed.length}].map(f=>(
                <button key={f.key} onClick={()=>setTaskFilter(f.key)} style={{padding:"7px 16px",fontSize:13,fontWeight:taskFilter===f.key?600:400,cursor:"pointer",borderRadius:6,border:taskFilter===f.key?"2px solid #7A9C80":"1px solid #d0d0d0",background:taskFilter===f.key?"#E7EAE5":"#fff",color:taskFilter===f.key?"#3d5c43":"#888",transition:"all 0.15s"}}>{f.label} ({f.count})</button>
              ))}
            </div>

            {/* Tasks table */}
            <div style={{background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",overflow:"hidden"}}>
              {filtered.length===0?<div style={{padding:40,textAlign:"center",color:"#999"}}>{taskFilter==="outstanding"?"No outstanding tasks.":"No completed tasks."}</div>:(
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead><tr style={{background:"#FBFAF7",borderBottom:"1px solid #e0e0e0"}}>
                  {["","Due Date","Name","Assigned To","Status",""].map((h,i)=><th key={i} style={{textAlign:"left",padding:"10px 14px",color:"#666",fontWeight:600,fontSize:12,textTransform:"uppercase",letterSpacing:0.5,width:h===""?(i===0?36:36):undefined}}>{h}</th>)}
                </tr></thead>
                <tbody>{_.orderBy(filtered,[t=>t.due||"9999"],["asc"]).map(task=>{
                  const isOverdue=task.due&&task.status!=="Completed"&&task.due<new Date().toISOString().split("T")[0];
                  const formatDate=(d)=>{if(!d)return"No date";const dt=new Date(d+"T12:00:00");return dt.toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"});};
                  const isClientTask=lead.contacts.some(c=>(c.role==="Client"||c.role==="Lead")&&c.name===task.assignee);
                  const clientContact=lead.contacts.find(c=>c.role==="Lead")||lead.contacts[0]||{};
                  return(<React.Fragment key={task.id}>
                  <tr style={{borderBottom:taskNotify===task.id?"none":"1px solid #f0f0f0"}} onMouseEnter={e=>e.currentTarget.style.background="#f2f3ef"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <td style={{padding:"12px 14px",width:36}}>
                      <div onClick={()=>toggleTask(task.id)} style={{width:20,height:20,borderRadius:4,border:"2px solid "+(task.status==="Completed"?"#7A9C80":"#ccc"),background:task.status==="Completed"?"#7A9C80":"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
                        {task.status==="Completed"&&<svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                      </div>
                    </td>
                    <td style={{padding:"12px 14px",whiteSpace:"nowrap"}}>
                      <div style={{color:isOverdue?"#dc3545":"#555",fontWeight:isOverdue?600:400}}>{formatDate(task.due)}{isOverdue&&<span style={{fontSize:10,marginLeft:6,color:"#dc3545",fontWeight:700}}>OVERDUE</span>}</div>
                      {task.status==="Completed"&&task.completedDate&&<div style={{fontSize:11,color:"#7A9C80",marginTop:2}}>Completed {formatDate(task.completedDate)}</div>}
                    </td>
                    <td style={{padding:"12px 14px"}}>
                      <div style={{fontWeight:500,color:"#434343",textDecoration:task.status==="Completed"?"line-through":"none"}}>{task.title}</div>
                      {task.description&&<div style={{fontSize:12,color:"#888",marginTop:2}}>{task.description}</div>}
                      <div style={{display:"flex",gap:6,marginTop:4}}>
                        {isClientTask&&task.status!=="Completed"&&<button onClick={()=>setTaskNotify(taskNotify===task.id?null:task.id)} style={{fontSize:11,color:"#7A9C80",background:"none",border:"1px solid #7A9C80",borderRadius:4,padding:"2px 8px",cursor:"pointer",display:"flex",alignItems:"center",gap:4}}><svg width="10" height="10" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="#7A9C80" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>Send to Client</button>}
                        {task.status!=="Completed"&&<button onClick={()=>{setTab("documents");setTimeout(()=>{setOpenFolder("Requested Docs");setOpenSub(null);},50);}} style={{fontSize:11,color:"#7A9C80",background:"none",border:"1px solid #7A9C80",borderRadius:4,padding:"2px 8px",cursor:"pointer",display:"flex",alignItems:"center",gap:4}}><svg width="10" height="10" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke="#7A9C80" strokeWidth="2" fill="none"/><path d="M14 2v6h6" stroke="#7A9C80" strokeWidth="2"/></svg>Upload Docs</button>}
                      </div>
                    </td>
                    <td style={{padding:"12px 14px",color:"#555"}}>{task.assignee||"—"}{isClientTask&&<div style={{fontSize:10,color:"#7A9C80",fontWeight:600}}>CLIENT</div>}</td>
                    <td style={{padding:"12px 14px"}}><span style={{fontSize:11,fontWeight:600,color:task.status==="Completed"?"#3d5c43":"#856404",background:task.status==="Completed"?"#dce8de":"#fef3cd",padding:"2px 10px",borderRadius:4}}>{task.status}</span></td>
                    <td style={{padding:"12px 14px",width:36}}><button onClick={()=>deleteTask(task.id)} style={{background:"none",border:"none",cursor:"pointer",padding:4,opacity:0.4}} title="Delete task"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><polyline points="3,6 5,6 21,6" stroke="#666" strokeWidth="1.5" strokeLinecap="round"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" stroke="#666" strokeWidth="1.5" fill="none"/></svg></button></td>
                  </tr>
                  {taskNotify===task.id&&(
                    <tr style={{borderBottom:"1px solid #f0f0f0",background:"#f9faf8"}}>
                      <td colSpan={6} style={{padding:"12px 20px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:8,fontSize:12,color:"#555"}}>
                          <span style={{fontWeight:600,color:"#434343"}}>Send task to {task.assignee}:</span>
                          <button onClick={()=>{const newComm={id:Date.now(),date:new Date().toISOString().split("T")[0],type:"Email",direction:"Outgoing",subject:"Task Assigned: "+task.title,body:"You have been assigned a task: "+task.title+(task.description?" — "+task.description:"")+(task.due?" (Due: "+task.due+")":""),to:task.assignee,email:clientContact.email||lead.email||""};update({communications:[newComm,...lead.communications]});setTaskNotify(null);}} style={{padding:"5px 14px",fontSize:12,fontWeight:500,border:"1px solid #d0d0d0",borderRadius:6,background:"#fff",color:"#434343",cursor:"pointer",display:"flex",alignItems:"center",gap:4}}><svg width="12" height="12" viewBox="0 0 24 24" fill="none"><rect x="2" y="4" width="20" height="16" rx="2" stroke="#7A9C80" strokeWidth="1.5" fill="none"/><path d="M22 6L12 13 2 6" stroke="#7A9C80" strokeWidth="1.5"/></svg>Email</button>
                          <button onClick={()=>setTaskNotify(null)} style={{marginLeft:"auto",background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#999"}}>Cancel</button>
                        </div>
                      </td>
                    </tr>
                  )}
                  </React.Fragment>);
                })}</tbody>
              </table>)}
            </div>
          </div>);
        })()}

        {tab==="communications"&&(()=>{
          const emails=(lead.communications||[]).filter(c=>c.type==="Email");
          return(<div>
            {/* Send / log an email */}
            <div style={{background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",padding:20,marginBottom:16}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:showEmailCompose?16:0}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:36,height:36,borderRadius:8,background:"#e7eae5",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke="#7a9c80" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
                  </div>
                  <div>
                    <div style={{fontSize:14,fontWeight:600,color:"#434343"}}>Email</div>
                    <div style={{fontSize:12,color:"#999"}}>Track outgoing emails to {lead.firstName} {lead.lastName}{lead.email?" ("+lead.email+")":""}</div>
                  </div>
                </div>
                <button onClick={()=>setShowEmailCompose(!showEmailCompose)} style={{padding:"8px 18px",fontSize:13,fontWeight:500,border:"none",borderRadius:6,background:showEmailCompose?"#eee":"#7a9c80",color:showEmailCompose?"#666":"#fff",cursor:"pointer"}}>{showEmailCompose?"Cancel":"New Email"}</button>
              </div>
              {showEmailCompose&&(
                <div>
                  <input value={emailSubject} onChange={e=>setEmailSubject(e.target.value)} placeholder="Subject" style={{width:"100%",padding:"10px 12px",fontSize:13,border:"1px solid #d0d0d0",borderRadius:6,outline:"none",marginBottom:10,fontFamily:"inherit"}}/>
                  <textarea value={emailBody} onChange={e=>setEmailBody(e.target.value)} placeholder="Email body..." rows={4} style={{width:"100%",padding:"10px 12px",fontSize:13,border:"1px solid #d0d0d0",borderRadius:6,outline:"none",resize:"vertical",fontFamily:"inherit",marginBottom:10}}/>
                  <div style={{display:"flex",justifyContent:"flex-end"}}>
                    <button onClick={sendEmail} disabled={!emailBody.trim()||!emailSubject.trim()} style={{padding:"8px 20px",fontSize:13,fontWeight:600,border:"none",borderRadius:6,background:(emailBody.trim()&&emailSubject.trim())?"#7a9c80":"#ccc",color:"#fff",cursor:(emailBody.trim()&&emailSubject.trim())?"pointer":"default"}}>Send Email</button>
                  </div>
                </div>
              )}
            </div>
            {/* Sent email log */}
            <div style={{background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",overflow:"hidden"}}>
              <div style={{padding:"14px 20px",borderBottom:"1px solid #eee",fontSize:14,fontWeight:600,color:"#434343",display:"flex",alignItems:"center",gap:8}}>
                <span>Sent Emails</span>
                <span style={{background:"#7a9c80",color:"#fff",borderRadius:10,padding:"1px 8px",fontSize:11,fontWeight:700}}>{emails.length}</span>
              </div>
              {emails.length===0?<div style={{padding:20,textAlign:"center",color:"#999",fontSize:13}}>No emails tracked yet.</div>:
              emails.map(c=>(
                <div key={c.id} style={{padding:"12px 20px",borderBottom:"1px solid #f5f5f5"}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{fontSize:13,fontWeight:600,color:"#434343"}}>{c.subject}</span>
                    <span style={{fontSize:11,color:"#999"}}>{c.date?new Date(c.date+"T12:00:00").toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"}):""}</span>
                  </div>
                  <div style={{fontSize:11,color:"#999"}}>{c.direction||"Outgoing"}{c.to?" — to "+c.to:""}</div>
                  {c.body&&<div style={{fontSize:12,color:"#666",marginTop:6,lineHeight:1.5,whiteSpace:"pre-wrap"}}>{c.body}</div>}
                </div>
              ))}
            </div>
          </div>);
        })()}

        {tab==="ai"&&(<AITab item={lead} isLead={true} update={update}/>)}
      </div>


      {taskNotifyPopup&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.35)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999}}>
          <div style={{background:"#fff",borderRadius:12,padding:"32px 36px",maxWidth:420,width:"90%",boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>
            <h3 style={{fontSize:16,fontWeight:700,color:"#434343",marginBottom:8}}>Notify Client</h3>
            <p style={{fontSize:13,color:"#666",marginBottom:20,lineHeight:1.5}}>Task <strong>"{taskNotifyPopup.title}"</strong> has been assigned to <strong>{taskNotifyPopup.assignee}</strong>. How would you like to notify them?</p>
            <div style={{display:"flex",gap:10,marginBottom:16}}>
              <button onClick={()=>{alert("Email notification sent to "+taskNotifyPopup.assignee);setTaskNotifyPopup(null);}} style={{flex:1,padding:"10px 16px",fontSize:13,fontWeight:600,border:"1px solid #d0d0d0",borderRadius:6,background:"#fff",color:"#434343",cursor:"pointer"}}>Email</button>
              <button onClick={()=>{alert("Text notification sent to "+taskNotifyPopup.assignee);setTaskNotifyPopup(null);}} style={{flex:1,padding:"10px 16px",fontSize:13,fontWeight:600,border:"1px solid #d0d0d0",borderRadius:6,background:"#fff",color:"#434343",cursor:"pointer"}}>Text</button>
              <button onClick={()=>{alert("Magic Link sent to "+taskNotifyPopup.assignee);setTaskNotifyPopup(null);}} style={{flex:1,padding:"10px 16px",fontSize:13,fontWeight:600,border:"none",borderRadius:6,background:"#7a9c80",color:"#fff",cursor:"pointer"}}>Magic Link</button>
            </div>
            <button onClick={()=>setTaskNotifyPopup(null)} style={{width:"100%",padding:"8px",fontSize:12,color:"#888",background:"none",border:"none",cursor:"pointer"}}>Skip — Don't notify</button>
          </div>
        </div>
      )}
      {/* Edit Lead Modal */}
      {editingLead&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:50}} onClick={()=>setEditingLead(false)}>
          <div style={{background:"#fff",borderRadius:12,padding:"28px 32px",width:480,maxWidth:"90vw",maxHeight:"90vh",overflowY:"auto",boxShadow:"0 8px 32px rgba(0,0,0,0.2)"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <h3 style={{fontSize:18,fontWeight:700,color:"#434343",margin:0}}>Edit Lead</h3>
              <div style={{cursor:"pointer",fontSize:20,color:"#999",lineHeight:1}} onClick={()=>setEditingLead(false)}>&times;</div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>

                  <div><label style={{fontSize:12,fontWeight:600,color:"#666",marginBottom:4,display:"block"}}>Last Name</label><input type="text" value={(editForm.joint||{}).lastName||""} onChange={e=>setEditForm({...editForm,joint:{...(editForm.joint||{}),lastName:e.target.value}})} style={{width:"100%",padding:"9px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,boxSizing:"border-box"}}/></div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
                  <div><label style={{fontSize:12,fontWeight:600,color:"#666",marginBottom:4,display:"block"}}>Email</label><input type="email" value={(editForm.joint||{}).email||""} onChange={e=>setEditForm({...editForm,joint:{...(editForm.joint||{}),email:e.target.value}})} style={{width:"100%",padding:"9px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,boxSizing:"border-box"}}/></div>
                  <div><label style={{fontSize:12,fontWeight:600,color:"#666",marginBottom:4,display:"block"}}>Phone</label><input type="tel" value={(editForm.joint||{}).phone||""} onChange={e=>setEditForm({...editForm,joint:{...(editForm.joint||{}),phone:e.target.value}})} style={{width:"100%",padding:"9px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,boxSizing:"border-box"}}/></div>

              <button onClick={saveEditLead} style={{padding:"10px 20px",fontSize:13,fontWeight:500,border:"none",borderRadius:6,background:"#7a9c80",color:"#fff",cursor:"pointer"}}>Save Changes</button>
